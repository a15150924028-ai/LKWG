<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>洛克王国pvp阵容搭配好帮手</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --ink: #17212b;
      --muted: #637083;
      --line: #d9e1ea;
      --primary: #116466;
      --primary-dark: #0b4f52;
      --accent: #e0a322;
      --good: #138a5b;
      --bad: #c03945;
      --info: #2563a6;
      --shadow: 0 16px 40px rgba(32, 43, 54, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(180deg, rgba(17, 100, 102, 0.08), rgba(17, 100, 102, 0) 280px),
        var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
      line-height: 1.5;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select,
    input {
      border-radius: 6px;
    }

    .app {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 42px);
      letter-spacing: 0;
      line-height: 1.15;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 980px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      border: 1px solid transparent;
      padding: 0 16px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(22, 33, 43, 0.08);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease, border-color 0.16s ease;
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(22, 33, 43, 0.14);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(22, 33, 43, 0.16);
    }

    .button:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 3px rgba(17, 100, 102, 0.18), 0 8px 18px rgba(22, 33, 43, 0.14);
    }

    .button.primary {
      background: var(--primary);
      color: #fff;
    }

    .button.primary:hover {
      background: var(--primary-dark);
    }

    .button.ride {
      --roller-skill-color: #607d8b;
      border-color: rgba(77, 101, 113, 0.42);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(0, 0, 0, 0.08)),
        var(--roller-bg, var(--roller-skill-color));
      background-color: var(--roller-skill-color);
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      color: #fff;
      font-weight: 800;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
    }

    .button.ride .button-icon {
      width: 22px;
      height: 22px;
      border: 1px solid rgba(255, 255, 255, 0.46);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.2);
      object-fit: contain;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.16);
    }

    .button.ride .button-icon.placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
    }

    .button.ride:hover {
      border-color: rgba(77, 101, 113, 0.68);
      background-color: #6f8f9e;
    }

    .button.undo-ride {
      border-color: rgba(119, 84, 142, 0.36);
      background: #77548e;
      color: #fff;
      font-weight: 800;
    }

    .button.undo-ride:hover {
      border-color: rgba(119, 84, 142, 0.62);
      background: #68477f;
    }

    .button.ghost {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.7);
    }

    .button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }

    .statusbar {
      margin: -8px 0 16px;
      color: var(--muted);
      font-size: 12px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(380px, 0.92fr);
      gap: 18px;
      align-items: start;
    }

    .section {
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.84);
    }

    .section-head h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .source {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .pet-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
    }

    .pet-card h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }

    .pet-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .pet-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 26px;
      border-radius: 999px;
      background: #e8f3f3;
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 6px;
    }

    .pet-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
      gap: 6px;
      margin-bottom: 6px;
    }

    .field {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .field-wide {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      margin: 0 0 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .readonly-line {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 3px;
      flex: 1;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      padding: 5px 7px;
      overflow: hidden;
    }

    .readonly-tags {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .readonly-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
      width: 100%;
    }

    .stat-cell {
      min-width: 0;
      border: 1px solid rgba(23, 33, 43, 0.08);
      border-radius: 6px;
      background: #fff;
      padding: 3px 2px;
      text-align: center;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .stat-value {
      display: block;
      margin-top: 2px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.1;
    }

    .pvp-panel-stats .stat-grid {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 3px;
    }

    .pvp-panel-stats .stat-cell {
      padding: 2px 1px;
    }

    .pvp-panel-stats .stat-label {
      font-size: 10px;
    }

    .pvp-panel-stats .stat-value {
      margin-top: 1px;
      font-size: 12px;
    }

    .pvp-default-note {
      margin-top: 3px;
      color: #dc2626;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.2;
    }

    .pvp-recommend {
      display: grid;
      gap: 3px;
      width: 100%;
    }

    .pvp-line {
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .pvp-line + .pvp-line {
      margin-top: 0;
    }

    .pvp-note {
      margin-top: 1px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    select,
    input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 6px 8px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(17, 100, 102, 0.14);
    }

    .type-select {
      padding-left: 30px;
      background-repeat: no-repeat;
      background-size: 18px 18px;
      background-position: 8px center;
    }

    .combo {
      position: relative;
    }

    .combo-control {
      position: relative;
      display: grid;
      grid-template-columns: 31px minmax(0, 1fr) 24px;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .combo-control:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(17, 100, 102, 0.14);
    }

    .combo-control input {
      min-width: 0;
      min-height: 34px;
      border: 0;
      border-radius: 0;
      padding: 5px 3px;
      box-shadow: none;
    }

    .combo-icon {
      width: 26px;
      height: 26px;
      margin-left: 5px;
      border: 1px solid rgba(23, 33, 43, 0.12);
      border-radius: 6px;
      object-fit: contain;
      background: #eef3f7;
    }

    .combo-icon.placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .combo-icon.stat-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--icon-bg, #64748b);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .combo-clear {
      width: 24px;
      height: 24px;
      border: 0;
      background: transparent;
      color: #8491a1;
      cursor: pointer;
      font-weight: 800;
    }

    .combo-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      z-index: 30;
      display: none;
      max-height: 270px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 18px 32px rgba(23, 33, 43, 0.14);
    }

    .combo.open .combo-menu {
      display: block;
    }

    .combo-option {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 0;
      border-bottom: 1px solid #edf2f7;
      background: #fff;
      color: var(--ink);
      padding: 7px 8px;
      text-align: left;
      cursor: pointer;
    }

    .combo-option:hover,
    .combo-option.active {
      background: #e8f3f3;
    }

    .option-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 800;
    }

    .option-meta {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .skills {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      margin-top: 6px;
    }

    .skill-row {
      display: grid;
      grid-template-columns: 31px minmax(0, 1fr);
      gap: 6px;
      align-items: center;
    }

    .slot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 31px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }

    .results {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .input-pet-results {
      border-top: 1px solid var(--line);
    }

    .mobile-pet-results {
      display: none;
      gap: 12px;
      padding: 0;
    }

    .result-card,
    .analysis-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
    }

    .result-card h3,
    .analysis-card h3 {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 8px;
      font-size: 15px;
    }

    .title-icon {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(23, 33, 43, 0.12);
      border-radius: 6px;
      background: #eef3f7;
      object-fit: contain;
    }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(23, 33, 43, 0.12);
      background: #edf2f7;
      color: #17212b;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag img {
      width: 15px;
      height: 15px;
    }

    .tag.good {
      background: #e7f6ef;
      color: var(--good);
      border-color: rgba(19, 138, 91, 0.2);
    }

    .tag.bad {
      background: #fae8eb;
      color: var(--bad);
      border-color: rgba(192, 57, 69, 0.2);
    }

    .tag.info {
      background: #e9f2fb;
      color: var(--info);
      border-color: rgba(37, 99, 166, 0.2);
    }

    .tag.empty {
      background: #f3f6f8;
      color: #8491a1;
    }

    .mini-title {
      margin: 8px 0 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .skill-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 6px;
    }

    .skill-chip {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px;
      background: #fbfdff;
    }

    .skill-chip strong {
      display: block;
      overflow: hidden;
      min-width: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .line {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .result-head h3 {
      min-width: 0;
      margin: 0;
    }

    .result-badges,
    .coverage-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .coverage-row {
      margin-top: 6px;
    }

    .coverage-label {
      flex: 0 0 54px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .analysis-list {
      display: grid;
      gap: 10px;
    }

    .pvp-sim-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .pvp-side {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfdff;
      padding: 8px;
    }

    .pvp-side h4 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .pvp-side-form {
      display: grid;
      grid-template-columns: minmax(104px, 104px) minmax(0, 1fr);
      gap: 6px;
    }

    .pvp-side-form .field {
      min-width: 0;
    }

    .pvp-side-form .field-wide {
      grid-column: 1 / -1;
    }

    .talent-picks {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
    }

    .talent-picks .combo-control {
      grid-template-columns: minmax(0, 1fr) 24px;
    }

    .talent-picks .combo-control .combo-icon {
      display: none;
    }

    [data-combo="nature"] .combo-control input,
    .talent-picks .combo-control input {
      font-size: 13px;
    }

    .talent-picks .combo-option {
      grid-template-columns: minmax(0, 1fr);
    }

    .talent-picks .combo-option .combo-icon {
      display: none;
    }

    .pvp-skill-picks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
    }

    .pvp-skill-slot {
      position: relative;
      min-width: 0;
    }

    .pvp-skill-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      min-width: 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      pointer-events: none;
    }

    .pvp-skill-slot .combo-control {
      grid-template-columns: 16px 31px minmax(0, 1fr) 24px;
      transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .pvp-skill-slot .combo-control input {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pvp-skill-slot .combo-control .combo-icon {
      transition: box-shadow 0.16s ease, background 0.16s ease;
    }

    .pvp-skill-slot.active .pvp-skill-index {
      color: #ffffff;
    }

    .pvp-force-row {
      margin-top: 5px;
    }

    .pvp-force-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      min-height: 32px;
      border: 1px solid #b8c7ff;
      border-radius: 6px;
      background: #eef3ff;
      color: #2f4295;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .pvp-force-button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      box-shadow: none;
      filter: grayscale(0.15);
    }

    .pvp-force-button.active {
      border-color: #5357c9;
      background: #5357c9;
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(83, 87, 201, 0.22);
    }

    .pvp-force-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .pvp-force-icon.placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.65);
      color: #2f4295;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .pvp-action-combo .combo-control {
      cursor: pointer;
    }

    .pvp-action-combo:not(.active) .combo-control:hover {
      border-color: #9fb7d5;
      background: #ffffff;
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.04);
    }

    .pvp-action-combo:not(.active) .combo-control:active {
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.06);
    }

    .pvp-action-combo.active .combo-control {
      border-color: #5357c9;
      background: #5357c9;
      box-shadow: 0 2px 8px rgba(83, 87, 201, 0.22);
    }

    .pvp-action-combo.active .combo-control input {
      background: transparent;
      color: #ffffff;
      font-weight: 900;
    }

    .pvp-action-combo.active .combo-control input::placeholder {
      color: rgba(255, 255, 255, 0.75);
    }

    .pvp-action-combo.active .combo-control .combo-icon {
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 2px 8px rgba(0, 43, 94, 0.16);
    }

    .pvp-action-combo.active .combo-clear {
      color: rgba(255, 255, 255, 0.86);
    }

    .pvp-action-combo.active .combo-clear:hover {
      color: #ffffff;
    }


    .pvp-buff-panel {
      display: grid;
      gap: 4px;
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      padding: 6px;

    .pvp-buff-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .pvp-buff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
      gap: 4px;
    }

    .pvp-buff-item {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .pvp-buff-label {
      color: #41506a;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
    }

    .pvp-buff-controls {
      display: grid;
      grid-template-columns: 20px minmax(30px, 1fr) 20px;
      align-items: center;
      gap: 2px;
    }

    .pvp-buff-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      min-height: 22px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .pvp-buff-button:hover {
      border-color: #9fb2c8;
      background: #eef5fb;
    }

    .pvp-buff-value {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      background: #fbfdff;
      color: #172033;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .pvp-buff-value.positive {
      color: #047857;
      background: #ecfdf5;
      border-color: #b7ebcf;
    }

    .pvp-buff-value.negative {
      color: #be123c;
      background: #fff1f2;
      border-color: #fecdd3;
    }

    .pvp-trait-layer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(132px, 0.8fr);
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .pvp-trait-layer-copy {
      min-width: 0;
      color: var(--muted);
    }

    .pvp-trait-layer-copy strong {
      display: block;
      overflow: hidden;
      color: var(--ink);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pvp-trait-layer-row .pvp-buff-controls {
      grid-template-columns: 36px minmax(56px, 1fr) 36px;
    }

    @media (max-width: 520px) {
      .pvp-trait-layer-row {
        grid-template-columns: 1fr;
      }
    }

    .pvp-damage-result {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      margin-top: 6px;
      border: 1px solid #c7d2fe;
      border-radius: 6px;
      background: #eef3ff;
      padding: 6px 7px;
      color: #26326d;
      font-size: 12px;
      line-height: 1.35;
    }

    .pvp-damage-result strong {
      color: #172033;
      font-size: 13px;
      font-weight: 900;
    }

    .pvp-trait-bonus {
      display: inline;
      padding: 0 3px;
      border: 1px solid #fecdd3;
      border-radius: 4px;
      background: #fff1f2;
      color: #b91c1c;
      font-weight: 900;
    }

    .pvp-damage-trait-line {
      flex-basis: 100%;
      width: 100%;
      color: #b91c1c;
      font-weight: 900;
    }

    .pvp-damage-lines {
      display: grid;
      gap: 4px;
      width: 100%;
    }

    .pvp-damage-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      line-height: 1.3;
    }

    .pvp-damage-result.warn {
      border-color: #f0d39a;
      background: #fff8e8;
      color: #684d17;
    }

    .pvp-damage-result.bad {
      border-color: #ffc2cc;
      background: #fff0f2;
      color: #65313a;
    }

    .team-build-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 6px;
    }

    [data-pvp-combo$="-nature"] .combo-control {
      grid-template-columns: minmax(0, 1fr) 24px;
    }

    [data-combo="nature"] .combo-control .combo-icon,
    [data-pvp-combo$="-nature"] .combo-control .combo-icon {
      display: none;
    }

    [data-combo="nature"] .combo-option,
    [data-pvp-combo$="-nature"] .combo-option {
      grid-template-columns: minmax(0, 1fr);
    }

    [data-combo="nature"] .combo-option .combo-icon,
    [data-pvp-combo$="-nature"] .combo-option .combo-icon {
      display: none;
    }

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 128px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(180deg, #f8fbff, #eef5f9);
      overflow: hidden;
    }

    .monster-preview img {
      width: min(68%, 170px);
      max-height: 150px;
      object-fit: contain;
    }

    .monster-preview.empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .notice {
      border-left: 4px solid var(--info);
      background: #eef6ff;
      padding: 10px 12px;
      border-radius: 6px;
      color: #1f425e;
      font-size: 13px;
    }

    .notice.warn {
      border-left-color: var(--bad);
      background: #fff0f2;
      color: #65313a;
    }

    .notice.good {
      border-left-color: var(--good);
      background: #ecf8f1;
      color: #285943;
    }

    .roller-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      align-items: start;
      gap: 8px;
      margin-top: 8px;
    }

    .roller-slot {
      min-width: 0;
      border: 1px solid var(--line);
      border-left: 4px solid var(--good);
      border-radius: 6px;
      background: #f1fbf5;
      padding: 8px;
    }

    .roller-slot.empty {
      min-height: 58px;
      border-left-color: #cbd5e1;
      background: #f8fafc;
    }

    .roller-slot.no-rec {
      border-left-color: var(--muted);
      background: #f8fafc;
    }

    .roller-slot-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 7px;
    }

    .roller-slot-title {
      min-width: 0;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.25;
    }

    .roller-slot-title span {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .roller-skill {
      display: grid;
      grid-template-columns: 31px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      margin-top: 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.74);
      padding: 6px;
    }

    .roller-slot-head .combo-icon {
      margin-left: 0;
    }

    .roller-skill strong {
      display: block;
      overflow: hidden;
      color: var(--ink);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .roller-skill-picker {
      margin-top: 7px;
    }

    .team-roller-skill-field {
      display: none;
    }

    .roller-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .roller-learners {
      margin-top: 6px;
      border: 1px solid rgba(23, 33, 43, 0.1);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.64);
      overflow: hidden;
    }

    .roller-learners summary {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 5px 7px;
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
      list-style: none;
    }

    .roller-learners summary::-webkit-details-marker {
      display: none;
    }

    .roller-learner-arrow {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      transition: transform 0.16s ease;
    }

    .roller-learners details[open] .roller-learner-arrow {
      transform: rotate(180deg);
    }

    .roller-learner-preview {
      overflow: hidden;
      color: var(--muted);
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .roller-learner-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      gap: 5px;
      max-height: 126px;
      overflow: auto;
      padding: 0 7px 7px;
    }

    .roller-learner-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      padding: 0 7px 7px;
    }

    .roller-learners details[open] + .roller-learner-strip {
      display: none;
    }

    .roller-learner-item {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 6px;
      min-height: 30px;
      border: 1px solid rgba(23, 33, 43, 0.08);
      border-radius: 6px;
      background: #fff;
      padding: 3px 5px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .roller-learner-item .combo-icon {
      width: 22px;
      height: 22px;
      margin-left: 0;
    }

    .roller-learner-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .roller-learners.empty {
      padding: 5px 7px;
    }

    .matrix-wrap {
      overflow: auto;
      border-top: 1px solid var(--line);
      max-height: 420px;
    }

    table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 7px;
      text-align: center;
      font-size: 12px;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f5f8fb;
      z-index: 1;
      color: #445061;
      font-weight: 800;
    }

    tbody th {
      left: 0;
      z-index: 2;
      text-align: left;
    }

    .mult-strong {
      color: var(--good);
      font-weight: 900;
    }

    .mult-weak {
      color: var(--bad);
      font-weight: 900;
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1180px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .input-pet-results {
        display: none;
      }

      .mobile-pet-results {
        display: grid;
      }

      .team-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 920px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .team-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 1500px);
        padding-top: 18px;
      }

      .team-grid {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .results {
        padding: 10px;
      }

      .source {
        text-align: left;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

    }

    @media (max-width: 430px) {
      .form-row,
      .pet-info-grid,
      .skills,
      .pvp-skill-picks,
      .pvp-buff-grid,
      .pvp-sim-grid,
      .pvp-side-form,
      .talent-picks,
      .team-build-grid {
        grid-template-columns: 1fr;
      }

      .stat-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .skill-list {
        grid-template-columns: 1fr;
      }
    }

</head>

      if (!url) return "";
      if (/^https?:\/\//i.test(url)) return url;
      return `${DATA_BASE}${url.startsWith("/") ? "" : "/"}${url}`;
    }

    function cloneData(value) {
      return JSON.parse(JSON.stringify(value || {}));
    }

    function unique(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function byTypeOrder(items) {
      const order = new Map(TYPES.map((type, index) => [type.key, index]));
      return unique(items).sort((a, b) => order.get(a) - order.get(b));
    }

    function relationMultiplier(attacker, defender) {
      const relation = RELATION[attacker] || { strong: [], weak: [] };
      if (relation.strong.includes(defender)) return 2;
      if (relation.weak.includes(defender)) return 0.5;
      return 1;
    }

    function combinedDefenseMultiplier(attacker, defenderTypes) {
      return defenderTypes.reduce((value, defender) => value * relationMultiplier(attacker, defender), 1);
    }

    function combinedOffenseMultiplier(attackerTypes, defender) {
      if (!attackerTypes.length) return 1;
      return Math.max(...attackerTypes.map((attacker) => relationMultiplier(attacker, defender)));
    }

    function strongTargetsForAttackTypes(attackerTypes) {
      return byTypeOrder(TYPES
        .filter((defender) => combinedOffenseMultiplier(attackerTypes, defender.key) > 1)
        .map((defender) => defender.key));
    }

    function resistedTargetsForAttackTypes(attackerTypes) {
      return byTypeOrder(TYPES
        .filter((defender) => attackerTypes.length && attackerTypes.every((attacker) => relationMultiplier(attacker, defender.key) < 1))
        .map((defender) => defender.key));
    }

    function weakAttackersAgainst(defenderTypes) {
      return byTypeOrder(TYPES
        .filter((attacker) => combinedDefenseMultiplier(attacker.key, defenderTypes) > 1)
        .map((attacker) => attacker.key));
    }

      return byTypeOrder(TYPES
        .filter((attacker) => defenderTypes.length && combinedDefenseMultiplier(attacker.key, defenderTypes) < 1)
        .map((attacker) => attacker.key));

      return skill && ["physical", "special", "attack"].includes(skill.category);

    function createCombo(host, config) {
      const selected = config.selectedItem || config.items.find((item) => item.id === config.value);
      const selectedText = selected ? (config.displayName ? config.displayName(selected) : selected.name) : "";
      const placeholder = selected && config.selectedPlaceholder != null ? config.selectedPlaceholder : config.placeholder;
      host.className = "combo";
      host.dataset.value = config.value || "";
      host.innerHTML = `
        <div class="combo-control">
          ${config.prefixHtml || ""}
          ${iconHtml(selected, "combo-icon")}
          <input type="text" value="${escapeHtml(selectedText)}" placeholder="${escapeHtml(placeholder)}" autocomplete="off" ${config.disabled ? "disabled" : ""} ${config.readonlyWhenSelected && selected ? "readonly" : ""}>
          <button class="combo-clear" type="button" title="清空">x</button>
        </div>
        <div class="combo-menu"></div>
      `;
      const input = host.querySelector("input");
      const clear = host.querySelector(".combo-clear");
      const menu = host.querySelector(".combo-menu");

      function open() {
        if (config.disabled) return;
        if (config.readonlyWhenSelected && host.dataset.value) return;
        if (!host.dataset.value && config.clearPlaceholderOnFocus && input.value === config.placeholder) {
          input.value = "";
        }
        host.classList.add("open");
        const items = config.itemsForQuery ? config.itemsForQuery(input.value) : config.items;
        renderComboOptions(menu, items, input.value, (item) => {
          host.dataset.value = item?.id || "";
          input.value = item ? (config.displayName ? config.displayName(item) : item.name) : "";
          if (config.readonlyWhenSelected) input.readOnly = Boolean(item);
          input.placeholder = item && config.selectedPlaceholder != null ? config.selectedPlaceholder : config.placeholder;
          setComboIcon(host, item || null);
          host.classList.remove("open");
          config.onSelect(item || null);
        }, { skipFilter: config.skipDefaultFilter });
      }

      input.addEventListener("focus", open);
      input.addEventListener("input", open);
      clear.addEventListener("click", () => {
        if (config.disabled) return;
        host.dataset.value = "";
        input.value = "";
        if (config.readonlyWhenSelected) input.readOnly = false;
        input.placeholder = config.placeholder;
        setComboIcon(host, null);
        host.classList.remove("open");
        config.onSelect(null);
      });
    }

    function setComboIcon(host, item) {
      const currentIcon = host.querySelector(".combo-control .combo-icon");
      if (!currentIcon) return;
      const wrapper = document.createElement("div");
      wrapper.innerHTML = iconHtml(item, "combo-icon").trim();
      currentIcon.replaceWith(wrapper.firstElementChild);
    }

    function renderComboOptions(menu, items, query, onSelect, options = {}) {
      const q = query.trim().toLowerCase();
      const filtered = (options.skipFilter ? items : items.filter((item) => {
        if (!q) return true;
        return item.name.toLowerCase().includes(q) || (item.aliases || []).some((alias) => alias.toLowerCase().includes(q));
      })).slice(0, 80);
      menu.innerHTML = filtered.length ? filtered.map((item) => `
        <button class="combo-option" type="button" data-id="${escapeHtml(item.id)}">
          ${iconHtml(item, "combo-icon")}
          <span>
            <span class="option-title">${escapeHtml(item.name)}</span>
            <span class="option-meta">${escapeHtml(itemMeta(item))}</span>
          </span>
        </button>
      `).join("") : '<button class="combo-option" type="button" data-id=""><span class="combo-icon placeholder">?</span><span><span class="option-title">没有匹配结果</span><span class="option-meta">请换关键词</span></span></button>';
      menu.querySelectorAll(".combo-option").forEach((button) => {
        button.addEventListener("mousedown", (event) => {
          event.preventDefault();
          const item = items.find((entry) => entry.id === button.dataset.id);
          if (item) onSelect(item);
        });
      });
    }

    function itemMeta(item) {
      if (!item) return "";
      if (item.kind === "monster") {
        return item.types.map(typeName).join(" / ") || "无属性";
      }
      if (item.kind === "passive") {
        return passiveDescription(item, "特性");
      }
      if (item.kind === "bloodline") {
        return item.description || "血脉";
      }
      if (item.kind === "nature") {
        return "";
      }
      if (item.kind === "talent") {
        return "";
      }
      return `${typeName(item.type)} / ${CATEGORY_NAMES[item.category] || item.category}${item.power != null ? ` / 威力${item.power}` : ""}`;
    }

    function iconHtml(item, className) {
      if (item?.icon) {
        return `<img class="${className}" src="${escapeHtml(item.icon)}" alt="">`;
      }
      if (item?.type) {
        return `<img class="${className}" src="${escapeHtml(typeIcon(item.type))}" alt="">`;
      }
      if (item?.iconText) {
        const color = item.iconColor || "#64748b";
        return `<span class="${className} stat-icon" style="--icon-bg:${escapeHtml(color)}">${escapeHtml(item.iconText)}</span>`;
      }
      return `<span class="${className} placeholder">?</span>`;
    }

    function normalizeSearchText(value) {
      return String(value || "").toLowerCase().replace(/[\s'’`·\-_/\\（）()：:，,。.！!？?+]/g, "");
    }

    function pinyinParts(value) {
      return [...String(value || "")].map((char) => PINYIN_MAP[char] || normalizeSearchText(char)).filter(Boolean);
    }

    function pinyinText(value) {
      return pinyinParts(value).join("");
    }

    function pinyinInitials(value) {
      return pinyinParts(value).map((part) => part[0] || "").join("");
    }

    function levenshteinDistance(a, b, limit = Infinity) {
      if (Math.abs(a.length - b.length) > limit) return limit + 1;
      let prev = Array.from({ length: b.length + 1 }, (_, index) => index);
      for (let i = 1; i <= a.length; i += 1) {
        const curr = [i];
        let rowMin = curr[0];
        for (let j = 1; j <= b.length; j += 1) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          const value = Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost);
          curr[j] = value;
          rowMin = Math.min(rowMin, value);
        }
        if (rowMin > limit) return limit + 1;
        prev = curr;
      }
      return prev[b.length];
    }

    function fuzzySkillScore(skill, query) {
      const q = normalizeSearchText(query);
      if (!q) return 1;
      const qPy = pinyinText(q);
      const qInitials = pinyinInitials(q);
      const names = [skill.name, ...(skill.aliases || [])];
      let best = 0;
      for (const name of names) {
        const key = normalizeSearchText(name);
        const keyPy = pinyinText(name);
        const keyInitials = pinyinInitials(name);
        if (key.includes(q)) best = Math.max(best, 1000 - key.indexOf(q));
        const pinyinIndex = [keyPy.indexOf(q), keyPy.indexOf(qPy)].filter((index) => index >= 0).sort((a, b) => a - b)[0];
        if (pinyinIndex != null) best = Math.max(best, 920 - pinyinIndex);
        if (keyInitials.includes(q) || keyInitials.includes(qInitials)) best = Math.max(best, 820);
        const target = qPy || q;
        const distanceLimit = Math.max(1, Math.floor(target.length * 0.28));
        const distance = levenshteinDistance(target, keyPy, distanceLimit);
        if (distance <= distanceLimit) best = Math.max(best, 760 - distance * 40);
      }
      return best;
    }

    function fuzzySkillItems(query) {
      const q = normalizeSearchText(query);
      if (!q) return dexData.skills;
      const ranked = dexData.skills
        .map((skill, index) => ({ skill, index, score: fuzzySkillScore(skill, q) }))
        .filter((item) => item.score > 0)
        .sort((a, b) => b.score - a.score || a.index - b.index)
        .map((item) => item.skill);
      return ranked.length ? ranked : dexData.skills.slice(0, 20);
    }

    function coverageOfTypes(attackTypes) {
      return byTypeOrder(TYPES
        .filter((defender) => attackTypes.some((attacker) => relationMultiplier(attacker, defender.key) > 1))
        .map((defender) => defender.key));
    }

    function missingTargets(attackTypes) {
      const covered = new Set(coverageOfTypes(attackTypes));
      return TYPES.filter((type) => !covered.has(type.key)).map((type) => type.key);
    }

    function bestReplacement(currentAttackTypes, removedType) {
      const baseTypes = currentAttackTypes.slice();
      const removedIndex = baseTypes.indexOf(removedType);
      if (removedIndex >= 0) baseTypes.splice(removedIndex, 1);
      const baseCoverage = new Set(coverageOfTypes(baseTypes));
      const used = new Set(baseTypes);

      let best = null;
      for (const candidate of TYPES.map((type) => type.key)) {
        if (candidate === removedType) continue;
        const candidateCoverage = RELATION[candidate].strong;
        const newTargets = candidateCoverage.filter((target) => !baseCoverage.has(target));
        const score = newTargets.length * 100
          + candidateCoverage.length * 5
          + (used.has(candidate) ? 0 : 8);
        if (!best || score > best.score) {
          best = { type: candidate, newTargets, score };
        }
      }
      return best;
    }

    function greedySuggestions(attackTypes, targets) {
      const suggestions = [];
      const remaining = new Set(targets);
      const used = new Set(attackTypes);
      while (remaining.size) {
        let best = null;
        for (const candidate of TYPES.map((type) => type.key)) {
          if (used.has(candidate)) continue;
          const covered = RELATION[candidate].strong.filter((target) => remaining.has(target));
          const score = covered.length * 100 + RELATION[candidate].strong.length;
          if (covered.length && (!best || score > best.score)) {
            best = { type: candidate, covered, score };
          }
        }
        if (!best) break;
        suggestions.push(best);
        used.add(best.type);
        best.covered.forEach((target) => remaining.delete(target));
      }
      return suggestions;
    }

    function scoreSuperSkill(monster, passive, skill) {
      if (!monster || !passive || !skill) return null;
      const passiveText = `${passive.name} ${passive.description}`;
      const skillText = `${skill.name} ${skill.description}`;
      let score = 0;
      const reasons = [];

      const sameTypeTriggers = [
        ["grass", "草系"],
        ["water", "水系"],
        ["fire", "火系"],
        ["electric", "电系"],
        ["poison", "毒系"],
        ["fantasy", "幻系"],

        ["dragon", "龙系"],

        ["demon", "恶系"],
        ["bug", "虫系"],
        ["normal", "普通"],
        ["wing", "翼系"],
        ["ground", "地系"]
      ];
      for (const [type, text] of sameTypeTriggers) {
        if (passiveText.includes(text) && skill.type === type) {
          score += 55;
          reasons.push(`触发特性的${text}条件`);

      ];

      for (const pair of pairs) {

          score += pair.score;

      if (/永久/.test(skillText)) score += 18;
      if (/100%/.test(skillText)) score += 10;

      if (score < 55) return null;
      return {
        score: Math.round(score),
        reasons: unique(reasons).slice(0, 3)
      };

    function calcPvpSpeed(baseSpeed, natureMod, speedTalentIv = PVP_SPEED_TALENT_IV, traitMod = 0) {
      const trainedBase = PVP_NON_HP_STAT_RATE * (Number(baseSpeed) + PVP_IV_STAT_RATE * speedTalentIv) + PVP_NON_HP_INNER_BONUS;
