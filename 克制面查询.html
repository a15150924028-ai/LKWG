        return `
          <article class="result-card">
            <div class="result-head">
              <h3>${iconHtml(monster, "title-icon")}<span>${petIndex + 1}. ${escapeHtml(pet.name || `精灵${petIndex + 1}`)}</span></h3>
              <div class="result-badges">${chips(petTypes)}<span class="tag info">${escapeHtml(bloodline?.name || "未选血脉")}</span></div>
            </div>
            <div class="line">特性：${escapeHtml(passiveNames)}</div>
            <div class="coverage-row">
              <span class="coverage-label">克制</span>
              <div class="meta-line">${chips(innateStrong, "good")}</div>
            </div>
            <div class="coverage-row">
              <span class="coverage-label">被抵抗</span>
              <div class="meta-line">${chips(innateResisted, "info")}</div>
            </div>
            <div class="coverage-row">
              <span class="coverage-label">被克制</span>
              <div class="meta-line">${chips(weakBy, "bad")}</div>
            </div>
            <div class="coverage-row">
              <span class="coverage-label">抵抗</span>
              <div class="meta-line">${chips(resistFrom, "good")}</div>
            </div>
            <div class="skill-list">${skillRows}</div>
          </article>
        `;
      }).join("");

      inputPetResultsEl.innerHTML = petHtml;
      resultsEl.innerHTML = renderRollerSuperModule(team)
        + renderAnalysis(team)
        + renderPvpDamageSimulation(team)
        + `<div class="mobile-pet-results">${petHtml}</div>`;
      hydrateRollerSkillPickers(team);
      hydratePvpDamageSimulation(team);
    }

    function rotateSkillsDown() {
      const team = readTeam();
      rollerHistory.push(JSON.parse(JSON.stringify(team)));
      const slots = team.flatMap((pet, petIndex) => pet.skills.map((skill, skillIndex) => ({
        petIndex,
        skillIndex,
        skill: { ...skill }
      })));
      const lastSkill = slots[slots.length - 1].skill;
      for (let index = slots.length - 1; index > 0; index -= 1) {
        const target = slots[index];
        team[target.petIndex].skills[target.skillIndex] = slots[index - 1].skill;
      }
      team[0].skills[0] = lastSkill;
      renderTeam(team);
      saveSpecificTeam(team);
      renderResults();
    }

    function undoRoller() {
      const previousTeam = rollerHistory.pop();
      if (!previousTeam) return;
      renderTeam(previousTeam);
      saveSpecificTeam(previousTeam);
      renderResults();
    }

    function renderMatrix() {
      const header = `<tr><th>攻击 \\ 防守</th>${TYPES.map((type) => `<th><span class="tag"><img src="${typeIcon(type.key)}" alt="">${type.name}</span></th>`).join("")}</tr>`;
      const rows = TYPES.map((attacker) => {
        const cells = TYPES.map((defender) => {
          const multiplier = relationMultiplier(attacker.key, defender.key);
          const className = multiplier > 1 ? "mult-strong" : multiplier < 1 ? "mult-weak" : "";
          const text = multiplier > 1 ? "2x" : multiplier < 1 ? "0.5x" : "1x";
          return `<td class="${className}">${text}</td>`;
        }).join("");
        return `<tr><th><span class="tag"><img src="${typeIcon(attacker.key)}" alt="">${attacker.name}</span></th>${cells}</tr>`;
      }).join("");
      matrixWrap.innerHTML = `<table aria-label="属性关系表"><thead>${header}</thead><tbody>${rows}</tbody></table>`;
    }

    function withBossForms(monsters) {
      return (monsters || [])
        .filter((monster) => !isGeneratedBossForm(monster))
        .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
    }

    function normalizeBundle(bundle) {
      const passives = (bundle.passives || []).map((passive) => ({
        kind: "passive",
        id: passive.id,
        name: passive.name,
        aliases: passive.name_aliases || [],
        icon: "",
        description: passive.description || passive.trigger || "",
        raw: passive
      })).sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));

      const monsters = (bundle.monsters || []).map((monster) => ({
        kind: "monster",
        id: monster.id,
        name: monster.name,
        aliases: monster.name_aliases || [],
        icon: absoluteUrl(monster.image_url),
        types: (monster.elements || []).map((element) => ELEMENT_TO_TYPE[element]).filter(Boolean),
        skillIds: monster.skills || [],
        passiveIds: monster.passives || [],
        raw: monster
      })).sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));

      const skills = (bundle.skills || []).map((skill) => ({
        kind: "skill",
        id: skill.id,
        name: skill.name,
        aliases: skill.name_aliases || [],
        icon: absoluteUrl(skill.image_url),
        type: ELEMENT_TO_TYPE[skill.element] || "",
        category: skill.category || "",
        power: skill.power,
        accuracy: skill.accuracy,
        pp: skill.pp,
        priority: skill.priority,
        description: skill.description || "",
        raw: skill
      })).map(applyS2SkillOverride).filter((skill) => skill.type).sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));

      return {
        generatedAt: bundle.generated_at || new Date().toISOString(),
        currentSeason: bundle.currentSeason || "",
        seasons: bundle.seasons || [],
        sourceCommit: bundle.source_commit || "",
        monsters,
        passives,
        bloodlines: BLOODLINES,
        skills
      };
    }

    function applyS2SkillOverride(skill) {
      const override = S2_SKILL_OVERRIDES[skill?.name];
      if (!override) return skill;
      const next = { ...skill, ...override };
      if (skill.raw) {
        next.raw = { ...skill.raw, ...override };
      }
      return next;
    }

    function localSkillPoolOverrides() {
      return typeof window !== "undefined" && window.LCX_SKILL_POOL_OVERRIDES
        ? window.LCX_SKILL_POOL_OVERRIDES
        : null;
    }

    function skillPoolNames(pool) {
      return unique(["m", "j", "x"].flatMap((key) => Array.isArray(pool?.[key]) ? pool[key] : []));
    }

    function applyLocalSkillPoolOverrides(data) {
      const overrides = localSkillPoolOverrides();
      if (!overrides || !data?.monsters?.length || !data?.skills?.length) return data;
      const skillIdByName = new Map();
      (data.skills || []).forEach((skill) => {
        if (!skill?.name) return;
        if (!skillIdByName.has(skill.name)) skillIdByName.set(skill.name, skill.id);
        (skill.aliases || []).forEach((alias) => {
          if (alias && !skillIdByName.has(alias)) skillIdByName.set(alias, skill.id);
        });
      });
      return {
        ...data,
        monsters: data.monsters.map((monster) => {
          const pool = overrides[monster.name] || (monster.aliases || []).map((alias) => overrides[alias]).find(Boolean);
          if (!pool) return monster;
          const skillIds = skillPoolNames(pool).map((name) => skillIdByName.get(name)).filter(Boolean);
          if (!skillIds.length) return monster;
          return {
            ...monster,
            skillIds,
            raw: monster.raw ? { ...monster.raw, skills: skillIds, local_skill_pool_override: pool } : monster.raw
          };
        })
      };
    }

    function ensureArkRollerSkill(data) {
      data.skills = data.skills || [];
      data.monsters = data.monsters || [];

      let rollerSkill = data.skills.find((skill) => skill.name === "过山车");
      if (!rollerSkill) {
        rollerSkill = {
          kind: "skill",
          id: ARK_ROLLER_SKILL_ID,
          name: "过山车",
          aliases: ["机幕方舟专属"],
          icon: "",
          type: "mechanical",
          category: "status",
          power: null,
          accuracy: null,
          pp: 1,
          priority: 0,
          description: "机幕方舟专属技能，可通过过山车传递队友技能。",
          raw: {
            id: ARK_ROLLER_SKILL_ID,
            name: "过山车",
            element: TYPE_TO_ELEMENT.mechanical,
            category: "status",
            power: null,
            accuracy: null,
            pp: 1,
            priority: 0,
            description: "机幕方舟专属技能，可通过过山车传递队友技能。"
          }
        };
        data.skills.push(rollerSkill);
        data.skills.sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
      }

      data.monsters
        .filter((monster) => ARK_ROLLER_MONSTER_RE.test(monster.name))
        .forEach((monster) => {
          monster.skillIds = unique([...(monster.skillIds || []), rollerSkill.id]);
          if (monster.raw) {
            monster.raw.skills = unique([...(monster.raw.skills || []), rollerSkill.id]);
          }
        });

      return data;
    }

    function applyDexData(data) {
      const nextData = {
        ...data,
        monsters: withBossForms(data.monsters || []),
        skills: (data.skills || []).map(applyS2SkillOverride)
      };
      dexData = ensureArkRollerSkill(applyLocalSkillPoolOverrides(nextData));
      monsterById = new Map(dexData.monsters.map((monster) => [monster.id, monster]));
      skillById = new Map(dexData.skills.map((skill) => [skill.id, skill]));
      passiveById = new Map((dexData.passives || []).map((passive) => [passive.id, passive]));
      bloodlineById = new Map(BLOODLINES.map((bloodline) => [bloodline.id, bloodline]));
      updateRollerButtonIcon();
      const bossCount = dexData.monsters.filter(isBossVariant).length;
      dataStatus.textContent = `当前数据：${dexData.currentSeason || "未知赛季"}，${dexData.monsters.length} 只精灵（含 ${bossCount} 个首领形态），${dexData.skills.length} 个技能，${BLOODLINES.length} 个血脉，${(dexData.passives || []).length} 个特性；更新时间 ${dexData.generatedAt || "未知"}`;
    }

    async function updateDexData() {
      updateBtn.disabled = true;
      dataStatus.textContent = "正在联网更新精灵、特性、精灵技能池和技能数值...";
      try {
        const response = await fetch(DATA_URL, { cache: "no-cache" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const bundle = await response.json();
        const normalized = normalizeBundle(bundle);
        localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(normalized));
        applyDexData(normalized);
        renderTeam(sanitizeTeamForDex(loadTeam()));
        renderResults();
      } catch (error) {
        dataStatus.textContent = `更新失败：${error.message}。已使用本地缓存或内置示例。`;
      } finally {
        updateBtn.disabled = false;
      }
    }

    function loadDexData() {
      try {
        const cached = JSON.parse(localStorage.getItem(DATA_STORAGE_KEY) || "null");
        if (cached?.monsters?.length && cached?.skills?.length) {
          cached.passives = cached.passives || [];
          cached.bloodlines = BLOODLINES;
          applyDexData(cached);
          return;
        }
      } catch (error) {
        localStorage.removeItem(DATA_STORAGE_KEY);
      }
      applyDexData(FALLBACK_DATA);
      updateDexData();
    }

    function sanitizeTeamForDex(team) {
      return normalizeTeam(team).map((pet) => {
        const monster = monsterById.get(pet.monsterId);
        if (!monster) return { ...pet, natureId: "", talentIds: ["", "", ""], rollerSkillId: "", skills: pet.skills.map(() => ({ skillId: "" })) };
        const allowedSkills = new Set(monster.skillIds || []);
        return {
          ...pet,
          bloodlineId: bloodlineById.has(pet.bloodlineId) ? pet.bloodlineId : "",
          natureId: PVP_NATURES.some((nature) => nature.id === pet.natureId) ? pet.natureId : "",
          talentIds: Array.from({ length: 3 }, (_, index) => (
            PVP_TALENTS.some((talent) => talent.id === pet.talentIds?.[index]) ? pet.talentIds[index] : ""
          )),
          rollerSkillId: skillById.has(pet.rollerSkillId) ? pet.rollerSkillId : "",
          skills: pet.skills.map((skill) => ({ skillId: skillById.has(skill.skillId) ? skill.skillId : "" }))
        };
      });
    }

    teamGrid.addEventListener("change", (event) => {
      saveTeam();
      renderResults();
    });

    document.addEventListener("mousedown", closeCombos);
    calculateBtn.addEventListener("click", renderResults);
    rollerBtn.addEventListener("click", rotateSkillsDown);
    undoRollerBtn.addEventListener("click", undoRoller);
    updateBtn.addEventListener("click", updateDexData);
    clearBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      rollerHistory.length = 0;
      renderTeam(defaultTeam());
      renderResults();
    });

    loadDexData();
    renderTeam(sanitizeTeamForDex(loadTeam()));
    renderMatrix();
    renderResults();
  </script>
</body>
</html>
