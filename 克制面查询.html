      `;
    }

    const PVP_SPEED_TALENT_IV = PVP_MAX_IV;

    function calcPvpSpeed(baseSpeed, natureMod, speedTalentIv = PVP_SPEED_TALENT_IV, traitMod = 0) {
      const trainedBase = PVP_NON_HP_STAT_RATE * (Number(baseSpeed) + PVP_IV_STAT_RATE * speedTalentIv) + PVP_NON_HP_INNER_BONUS;
      return Math.round(trainedBase * natureMod + PVP_NON_HP_FINAL_BONUS + traitMod);
    }

    function calcSpeedRange(monster) {
      const baseSpe = Number(monster?.raw?.stats?.spe) || 0;
      if (!baseSpe) return null;
      const minSpeed = calcPvpSpeed(baseSpe, PVP_NATURE_DOWN_MOD);
      const maxSpeed = calcPvpSpeed(baseSpe, PVP_NATURE_UP_MOD);
      return { min: minSpeed, max: maxSpeed };
    }

    function monsterRoles(monster) {
      return (monster?.raw?.roles || [])
        .map((item) => item.role)
        .filter(Boolean);
    }

    function natureSpe(baseSpe, mod) {
      return calcPvpSpeed(baseSpe, mod);
    }

    function formatTalentText(text) {
      return String(text || "").replaceAll("HP", "生命").replaceAll("+60", "");
    }

    function choosePvpBuild(monster) {
      const stats = monster?.raw?.stats;
      if (!stats) return null;
      const roles = monsterRoles(monster);
      const hp = Number(stats.hp) || 0;
      const atk = Number(stats.atk) || 0;
      const def = Number(stats.defense) || 0;
      const spa = Number(stats.spa) || 0;
      const spd = Number(stats.spd) || 0;
      const spe = Number(stats.spe) || 0;
      const physicalBias = atk - spa;
      const isWall = roles.includes("wall") || (hp + def + spd >= atk + spa + spe + 60);
      const isAttacker = roles.includes("attacker") || Math.max(atk, spa) >= Math.max(def, spd) || spe > 80;
      const mainAttack = physicalBias >= 8 ? "物攻" : physicalBias <= -8 ? "魔攻" : "双攻";
      const lowAttack = physicalBias >= 8 ? "魔攻" : physicalBias <= -8 ? "物攻" : "较低攻击";

      if (isWall && !isAttacker) {
        const defChinese = def >= spd ? "物防" : "魔防";
        const nature1Spe = natureSpe(spe, 1.2);
        const nature2Spe = natureSpe(spe, 1.0);
        return {
          natures: [
            { name: `开朗（速度+ / 魔攻-）`, speed: nature1Spe },
            { name: `稳重（物防+ / 物攻-）`, speed: nature2Spe }
          ],
          talent: `HP+60 / ${defChinese}+60 / 速度+60`,
          note: "偏联防或续航定位，优先把耐久拉满。"
        };
      }

      if (spe >= 95 || (roles.includes("attacker") && spe >= 85)) {
        if (mainAttack === "双攻") {
          const nature1Spe = natureSpe(spe, 1.2);
          const nature2Spe = natureSpe(spe, 1.1);
          return {
            natures: [
              { name: "胆小（速度+ / 物攻-）", speed: nature1Spe },
              { name: "开朗（速度+ / 魔攻-）", speed: nature2Spe }
            ],
            talent: "速度+60 / 物攻+60 / 魔攻+60",
            note: "双攻差距不大，优先速度，双攻对点覆盖。"
          };
        }
        const nature1Spe = natureSpe(spe, 1.2);
        const nature2Spe = natureSpe(spe, 1.0);
        return {
          natures: [
            { name: `开朗（速度+ / ${lowAttack}-）`, speed: nature1Spe },
            { name: `固执（物攻+ / 魔攻-）`, speed: nature2Spe }
          ],
          talent: `速度+60 / ${mainAttack}+60 / HP+60`,
          note: `PVP优先抢先手。`
        };
      }

      if (mainAttack !== "双攻") {
        if (physicalBias >= 8) {
          const nature1Spe = natureSpe(spe, 1.0);
          const nature2Spe = natureSpe(spe, 0.9);
          return {
            natures: [
              { name: "固执（物攻+ / 魔攻-）", speed: nature1Spe },
              { name: "勇敢（物攻+ / 速度-）", speed: nature2Spe }
            ],
            talent: "物攻+60 / 速度+60 / HP+60",
            note: "主物攻输出，速度兜底便于站场换血。"
          };
        }
        const nature1Spe = natureSpe(spe, 1.0);
        const nature2Spe = natureSpe(spe, 0.9);
        return {
          natures: [
            { name: "聪明（魔攻+ / 物攻-）", speed: nature1Spe },
            { name: "冷静（魔攻+ / 速度-）", speed: nature2Spe }
          ],
          talent: "魔攻+60 / 速度+60 / HP+60",
          note: "主魔攻输出，速度兜底便于站场换血。"
        };
      }

      const nature1Spe = natureSpe(spe, 1.2);
      const nature2Spe = natureSpe(spe, 1.1);
      return {
        natures: [
          { name: "胆小（速度+ / 物攻-）", speed: nature1Spe },
          { name: "开朗（速度+ / 魔攻-）", speed: nature2Spe }
        ],
        talent: "速度+60 / 物攻+60 / 魔攻+60",
        note: "双攻均衡，保留速度和基础生存。"
      };
    }

    function renderPvpRecommendation(monster) {
      const build = choosePvpBuild(monster);
      if (!build) return '<span class="tag empty">未选择精灵</span>';
      const speedRange = calcSpeedRange(monster);
      const speedLine = speedRange
        ? `<div class="pvp-line">速度区间：<span style="color:var(--bad);">${speedRange.min}</span> ~ <span style="color:var(--good);">${speedRange.max}</span></div>`
        : "";
      const natureLines = build.natures.map((n) =>
        `<div class="pvp-line">${escapeHtml(n.name)} → 极速 ${n.speed}</div>`
      ).join("");
      return `
        <div class="pvp-recommend">
          ${speedLine}
          ${natureLines}
          <div class="pvp-line">推荐天分加点：${escapeHtml(formatTalentText(build.talent))}</div>
        </div>
      `;
    }

    function natureStatMods(natureId) {
      const mods = { hp: 1, atk: 1, defense: 1, spa: 1, spd: 1, spe: 1 };
      const map = {
        "nature-silent": ["hp", "atk"],
        "nature-peaceful": ["hp", "spa"],
        "nature-gloomy": ["hp", "defense"],
        "nature-careless-hp": ["hp", "spd"],
        "nature-practical": ["hp", "spe"],
        "nature-bold-atk": ["atk", "defense"],
        "nature-naughty": ["atk", "spd"],
        "nature-brave": ["atk", "spe"],
        "nature-strong": ["atk", "hp"],
        "nature-adamant": ["atk", "spa"],
        "nature-clever": ["spa", "atk"],
        "nature-focused": ["spa", "defense"],
        "nature-paranoid": ["spa", "spd"],
        "nature-quiet": ["spa", "spe"],
        "nature-rational": ["spa", "hp"],
        "nature-timid": ["spe", "atk"],
        "nature-jolly": ["spe", "spa"],
        "nature-hasty": ["spe", "defense"],
        "nature-reckless": ["spe", "spd"],
        "nature-passionate": ["spe", "hp"],
        "nature-steady": ["defense", "atk"],
        "nature-naive-defense": ["defense", "spa"],
        "nature-relaxed": ["defense", "spe"],
        "nature-lazy": ["defense", "spd"],
        "nature-frank": ["defense", "hp"],
        "nature-alert": ["spd", "atk"],
        "nature-shy": ["spd", "spa"],
        "nature-gentle": ["spd", "defense"],
        "nature-careful": ["spd", "spe"],
        "nature-anxious": ["spd", "hp"]
      };
      const pair = natureId ? map[natureId] : [DEFAULT_DAMAGE_NATURE_UP, DEFAULT_DAMAGE_NATURE_DOWN];
      if (pair?.[0] && pair?.[1]) {
        mods[pair[0]] = PVP_NATURE_UP_MOD;
        mods[pair[1]] = PVP_NATURE_DOWN_MOD;
      }
      return mods;
    }

    function effectiveTalentIds(state) {
      const ids = unique(state?.talentIds || []);
      DEFAULT_DAMAGE_TALENTS.forEach((id) => {
        if (ids.length < 3 && !ids.includes(id)) ids.push(id);
      });
      return ids.slice(0, 3);
    }

    function hasDamageTalent(state, statKey) {
      return effectiveTalentIds(state).some((id) => TALENT_STAT_BY_ID[id] === statKey);
    }

    function pvpTalentIv(state, statKey) {
      return hasDamageTalent(state, statKey) ? PVP_MAX_IV : 0;
    }

    function blankStatMods() {
      return { hp: 0, atk: 0, defense: 0, spa: 0, spd: 0, spe: 0 };
    }

    function normalizeStatMods(mods = {}) {
      const next = blankStatMods();
      Object.keys(next).forEach((key) => {
        next[key] = Number(mods[key]) || 0;
      });
      return next;
    }

    function mergeStatMods(...modsList) {
      const next = blankStatMods();
      modsList.forEach((mods) => {
        const normalized = normalizeStatMods(mods);
        Object.keys(next).forEach((key) => {
          next[key] += normalized[key];
        });
      });
      return next;
    }

    function compactBattleText(value) {
      return String(value || "").replace(/\s+/g, "");
    }

    function passiveList(monster) {
      return getMonsterPassives(monster).map((passive) => ({
        passive,
        text: `${passive.name || ""} ${passiveDescription(passive, "")}`,
        compact: compactBattleText(`${passive.name || ""} ${passiveDescription(passive, "")}`)
      }));
    }

    function addStatMod(mods, statKey, value) {
      if (!mods || !statKey || !Number.isFinite(value)) return;
      mods[statKey] = Math.max(mods[statKey] || 0, value);
    }

    function statModsFromText(text) {
      const mods = blankStatMods();
      const compact = compactBattleText(text);
      const applyAliases = (stat, aliases) => {
        for (const alias of stat.aliases) {
          const patterns = [
            new RegExp(`(?:获得|得到|取得)?${alias}\\+(\\d+)%`, "g"),
            new RegExp(`${alias}(?:属性|能力|力)?(?:提升|提高|增加|上升|加成)(\\d+)%`, "g"),
            new RegExp(`(?:提升|提高|增加|获得)(\\d+)%${alias}`, "g"),
            new RegExp(`(\\d+)%${alias}(?:加成|提升|提高|增加)?`, "g")
          ];
          for (const pattern of patterns) {
            for (const match of compact.matchAll(pattern)) {
              const value = Number(match[1]) || 0;
              if (value > 0) addStatMod(mods, stat.key, value / 100);
            }
          }
        }
      };
      for (const stat of PASSIVE_STAT_ALIASES) {
        applyAliases(stat, stat.aliases);
      }
      for (const match of compact.matchAll(/双攻\+(\d+)%/g)) {
        const value = (Number(match[1]) || 0) / 100;
        addStatMod(mods, "atk", value);
        addStatMod(mods, "spa", value);
      }
      for (const match of compact.matchAll(/双防\+(\d+)%/g)) {
        const value = (Number(match[1]) || 0) / 100;
        addStatMod(mods, "defense", value);
        addStatMod(mods, "spd", value);
      }
      return mods;
    }

    function passiveStatBoostIsCurrent(compact) {
      if (!compact) return false;
      if (/专注力/.test(compact)) return true;
      if (/囤积/.test(compact)) return false;
      if (/每入场1次.*获得/.test(compact)) return true;
      if (/入场首回合.*获得/.test(compact)) return true;
      if (/在场时.*获得/.test(compact)) return true;
      if (/入场时获得/.test(compact) && !/若|根据|每有|队伍|敌方/.test(compact)) return true;
      return false;
    }

    function pvpTeamMonsters(state) {
      if (state?.side !== "ally") return [];
      try {
        return readTeam().map((pet) => monsterById.get(pet.monsterId)).filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    function addAllAttackDefenseSpeed(mods, value) {
      ["atk", "spa", "defense", "spd", "spe"].forEach((key) => addStatMod(mods, key, value));
    }

    function passiveStatMods(monster, state = null) {
      const mods = blankStatMods();
      const traitEffects = window.LKWG_PVP_TRAIT_RULES.resolveTraitEffects(monster, state?.traitLayers);
      Object.assign(mods, mergeStatMods(mods, traitEffects.statMods));
      Object.defineProperty(mods, "__flat", {
        value: normalizeStatMods(traitEffects.statFlatMods),
        enumerable: false
      });
      const resolvedTraitNames = traitEffects.passiveNames?.length
        ? traitEffects.passiveNames
        : [traitEffects.rule?.traitName].filter(Boolean);
      for (const item of passiveList(monster)) {
        const isResolvedTraitPassive = resolvedTraitNames.some((name) => item.compact.includes(name));
        if (!isResolvedTraitPassive && passiveStatBoostIsCurrent(item.compact)) {
          Object.assign(mods, mergeStatMods(mods, statModsFromText(item.text)));
        }
        if (traitEffects.rule?.traitName !== "专注力" && /专注力/.test(item.compact) && /音速犬|护主犬/.test(monster?.name || "")) {
          mods.atk = Math.max(mods.atk, 1);
        }
        if (traitEffects.rule?.traitName !== "囤积" && /囤积/.test(item.compact) && /能量/.test(item.compact)) {
          const energy = Math.max(0, Math.min(10, Number(state?.energy ?? DEFAULT_PVP_ENERGY) || 0));
          const defenseBoost = energy * 0.1;
          mods.defense = Math.max(mods.defense, defenseBoost);
          mods.spd = Math.max(mods.spd, defenseBoost);
        }
        if (/壮胆/.test(item.compact)) {
          const hasBugTeammate = pvpTeamMonsters(state).some((teamMonster) => teamMonster.types?.includes("bug"));
          if (hasBugTeammate) {
            mods.atk = Math.max(mods.atk, 0.5);
            mods.spa = Math.max(mods.spa, 0.5);
          }
        }
        if (/虫群鼓舞|虫群突袭/.test(item.compact)) {
          const bugCount = pvpTeamMonsters(state)
            .filter((teamMonster) => teamMonster.id !== monster?.id && teamMonster.types?.includes("bug"))
            .length;
          if (bugCount > 0) {
            const perBug = /虫群突袭/.test(item.compact) ? 0.15 : 0.1;
            addAllAttackDefenseSpeed(mods, bugCount * perBug);
          }
        }
      }
      return mods;
    }

    function skillStatMods(skill) {
      if (!skill) return blankStatMods();
      return statModsFromText(`${skill.name || ""} ${skill.description || ""}`);
    }

    function passiveModLabels(mods) {
      return PASSIVE_STAT_ALIASES
        .filter((stat) => Math.abs(Number(mods?.[stat.key]) || 0) > 0.0001)
        .map((stat) => {
          const value = Math.round((Number(mods[stat.key]) || 0) * 100);
          return `${stat.label}${value > 0 ? "+" : ""}${value}%`;
        });
    }

    function finalBattleStat(monster, state, statKey) {
      const base = Number(monster?.raw?.stats?.[statKey]) || 0;
      const iv = pvpTalentIv(state, statKey);
      const mod = natureStatMods(state?.natureId)[statKey] || 1;
      const trained = statKey === "hp"
        ? PVP_HP_STAT_RATE * (base + PVP_IV_STAT_RATE * iv) + PVP_HP_INNER_BONUS
        : PVP_NON_HP_STAT_RATE * (base + PVP_IV_STAT_RATE * iv) + PVP_NON_HP_INNER_BONUS;
      const finalBonus = statKey === "hp" ? PVP_HP_FINAL_BONUS : PVP_NON_HP_FINAL_BONUS;
      return Math.max(1, Math.round(trained * mod + finalBonus));
    }

    function finalBattleStats(monster, state, passiveMods = passiveStatMods(monster, state), passiveFlatMods = passiveMods?.__flat) {
      const stats = {
        hp: finalBattleStat(monster, state, "hp"),
        atk: finalBattleStat(monster, state, "atk"),
        defense: finalBattleStat(monster, state, "defense"),
        spa: finalBattleStat(monster, state, "spa"),
        spd: finalBattleStat(monster, state, "spd"),
        spe: finalBattleStat(monster, state, "spe")
      };
      Object.keys(stats).forEach((key) => {
        const mod = Number(passiveMods?.[key]) || 0;
        if (Math.abs(mod) > 0.0001) {
          stats[key] = Math.max(1, Math.floor(stats[key] * (1 + mod)));
        }
        const flat = Number(passiveFlatMods?.[key]) || 0;
        if (Math.abs(flat) > 0.0001) {
          stats[key] = Math.max(1, Math.round(stats[key] + flat));
        }
      });
      return stats;
    }

    function forceImpactSkill(state, monster) {
      const bloodline = bloodlineById.get(state?.bloodlineId);
      if (bloodline?.id === "bloodline-boss") return null;
      const type = bloodline?.type || monster?.types?.[0] || "normal";
      return {
        id: "pvp-force-impact",
        kind: "skill",
        name: "愿力冲击",
        aliases: ["原力冲击"],
        type,
        category: "attack",
        power: FORCE_IMPACT_POWER,
        description: "按血脉属性优先估算，没有属性血脉时按精灵第一属性估算；敌方使用状态技能时伤害×2.5。"
      };
    }

    function pvpActionFromState(state, monster) {
      if (state?.action === "force" || state?.forceImpact) return forceImpactSkill(state, monster);
      const match = String(state?.action || "").match(/^skill:(\d)$/);
      if (!match) return null;
      const skillIndex = Number(match[1]);
      const skill = skillById.get(state.skillIds?.[skillIndex]);
      return skill ? { ...skill, pvpSkillIndex: skillIndex } : null;
    }

    function defenseReductionMultiplier(action) {
      if (!action || action.category !== "defense") return 1;
      const text = `${action.name || ""} ${action.description || ""} ${action.effect || ""} ${(action.effects || []).join(" ")}`;
      const match = text.match(/减伤\s*(\d+)%/);
      if (!match) return 1;
      const reduction = Math.max(0, Math.min(100, Number(match[1]) || 0));
      return Math.max(0, 1 - reduction / 100);
    }

    function sameTypeAttackBonus(action, attacker) {
      return attacker?.types?.includes(action?.type) ? SAME_TYPE_ATTACK_BONUS : 1;
    }

    function selectedPvpSkills(state) {
      return (state?.skillIds || []).map((id) => skillById.get(id)).filter(Boolean);
    }

    function selectedPvpSkillTypes(state) {
      return unique(selectedPvpSkills(state).map((skill) => skill.type));
    }

    function bloodlineMatchesName(state, pattern) {
      const bloodline = bloodlineById.get(state?.bloodlineId);
      return Boolean(bloodline && pattern.test(`${bloodline.name || ""} ${bloodline.id || ""}`));
    }

    function bloodlineType(state) {
      return bloodlineById.get(state?.bloodlineId)?.type || "";
    }

    function skillHasExtraEffect(skill) {
      const text = compactBattleText(`${skill?.description || ""} ${(skill?.effects || []).join(" ")}`);
      if (!text) return false;
      const plainPatterns = [/^(对敌方精灵)?造成(物理|魔法|物|魔)?伤害。?$/, /^造成(物伤|魔伤|伤害)。?$/];
      if (plainPatterns.some((pattern) => pattern.test(text))) return false;
      return /回复|获得|使敌方|若|后|回合|永久|能量|层|减免|提升|降低|偷取|冷却|打断|脱离|换|中毒|灼烧|冻结|萌化/.test(text);
    }

    function effectiveActionForPassives(action, attacker) {
      if (!action) return { action, labels: [] };
      const labels = [];
      let next = action;
      if (action.type === "normal" && passiveList(attacker).some((item) => /展翅/.test(item.compact))) {
        next = { ...action, type: "wing", passiveOriginalType: action.type };
        labels.push("展翅：普通变翼");
      }
      return { action: next, labels };
    }

    function addDamageLabel(labels, label) {
      if (label && !labels.includes(label)) labels.push(label);
    }

    function passiveDamageEffects(context) {
      const {
        attacker,
        defender,
        attackerState,
        defenderState,
        action,
        attackerStats,
        defenderStats,
        typeMultiplier
      } = context;
      const result = {
        powerAdd: 0,
        powerMultiplier: 1,
        damageMultiplier: 1,
        attackerLabels: [],
        defenderLabels: []
      };
      const attackerTypes = attacker?.types || [];
      const defenderTypes = defender?.types || [];
      const attackerPassiveItems = passiveList(attacker);
      const defenderPassiveItems = passiveList(defender);
      const attackerTraitRule = window.LKWG_PVP_TRAIT_RULES.resolveTraitRule(attacker);
      const defenderBloodlineType = bloodlineType(defenderState);
      const defenderSkillTypes = selectedPvpSkillTypes(defenderState);

      for (const item of attackerPassiveItems) {
        const text = item.compact;
        if (/顺风/.test(text) && attackerStats.spe > defenderStats.spe) {
          result.powerMultiplier *= 1.5;
          addDamageLabel(result.attackerLabels, "顺风威力+50%");
        }
        if (/电流刺激/.test(text) && isAttackSkill(action)) {
          result.powerAdd += 40;
          addDamageLabel(result.attackerLabels, "电流刺激威力+40");
        }
        if (/不移/.test(text) && isAttackSkill(action) && !skillHasExtraEffect(action)) {
          result.powerMultiplier *= 1.3;
          addDamageLabel(result.attackerLabels, "不移威力+30%");
        }
        if (/目空/.test(text) && action.type !== "light") {
          result.powerMultiplier *= 1.25;
          addDamageLabel(result.attackerLabels, "目空威力+25%");
        }
        if (/涂鸦/.test(text) && !attackerTypes.includes(action.type)) {
          result.powerMultiplier *= 1.5;
          addDamageLabel(result.attackerLabels, "涂鸦威力+50%");
        }
        if (/共鸣/.test(text) && /虫鸣/.test(action.name || "")) {
          result.powerAdd += 20;
          addDamageLabel(result.attackerLabels, "共鸣威力+20");
        }
        if (/冻土/.test(text) && action.type === "ground") {
          const iceCount = selectedPvpSkills(attackerState).filter((skill) => skill.type === "ice").length;
          if (iceCount > 0) {
            result.powerMultiplier *= (1 + iceCount * 0.1);
            addDamageLabel(result.attackerLabels, `冻土威力+${iceCount * 10}%`);
          }
        }
        if (/向心力/.test(text) && [0, 1].includes(action.pvpSkillIndex)) {
          result.powerMultiplier *= 1.3;
          addDamageLabel(result.attackerLabels, "向心力威力+30%");
        }
        if (/绒粉星光/.test(text) && defenderBloodlineType && !defenderTypes.includes(defenderBloodlineType)) {
          result.powerMultiplier *= 2;
          addDamageLabel(result.attackerLabels, "绒粉星光威力+100%");
        }
        if (/月光审判/.test(text) && isBossBloodlineId(defenderState?.bloodlineId)) {
          result.powerMultiplier *= 2;
          addDamageLabel(result.attackerLabels, "月光审判威力+100%");
        }
        if (/天通地明/.test(text) && bloodlineMatchesName(defenderState, /污染/)) {
          result.powerMultiplier *= 2;
          addDamageLabel(result.attackerLabels, "天通地明威力+100%");
        }
        if (attackerTraitRule?.traitName !== "血型吸引" && /血型吸引/.test(text)) {
          const typeCount = defenderSkillTypes.length;
          if (typeCount > 0) {
            result.powerMultiplier *= (1 + typeCount * 0.1);
            addDamageLabel(result.attackerLabels, `血型吸引威力+${typeCount * 10}%`);
          }
        }
      }

      for (const item of defenderPassiveItems) {
        const text = item.compact;
        if (/偏振/.test(text) && defenderSkillTypes.includes(action.type)) {
          result.damageMultiplier *= 0.6;
          addDamageLabel(result.defenderLabels, "偏振受伤-40%");
        }
        if (/绝对秩序/.test(text) && !attackerTypes.includes(action.type)) {
          result.damageMultiplier *= 0.5;
          addDamageLabel(result.defenderLabels, "绝对秩序受伤-50%");
        }
        if (/狂欢开始/.test(text) && typeMultiplier > 1) {
          result.damageMultiplier *= 1.25;
          addDamageLabel(result.defenderLabels, "狂欢开始克制受伤+25%");
        }
        if (/展翅/.test(text) && defenderStats.spe < attackerStats.spe) {
          result.damageMultiplier *= 1.25;
          addDamageLabel(result.defenderLabels, "展翅后手受伤+25%");
        }
      }

      return result;
    }

    function damageMode(skill, attackerStats, defenderStats) {
      if (skill.category === "physical") {
        return { attackKey: "atk", defenseKey: "defense", label: "物攻" };
      }
      if (skill.category === "special") {
        return { attackKey: "spa", defenseKey: "spd", label: "魔攻" };
      }
      const physicalRatio = attackerStats.atk / Math.max(1, defenderStats.defense);
      const specialRatio = attackerStats.spa / Math.max(1, defenderStats.spd);
      return physicalRatio >= specialRatio
        ? { attackKey: "atk", defenseKey: "defense", label: "物攻" }
        : { attackKey: "spa", defenseKey: "spd", label: "魔攻" };
    }

    function calcPvpDamage(attackerState, defenderState, action) {
      const attacker = monsterById.get(attackerState?.monsterId);
      const defender = monsterById.get(defenderState?.monsterId);
      if (!attacker || !defender || !action) return null;
      const effectiveAction = effectiveActionForPassives(action, attacker);
      const battleAction = effectiveAction.action;
      const basePower = Number(battleAction.power) || 0;
      if (!basePower || !isAttackSkill(battleAction)) {
        return { error: `${action.name} 暂无可计算威力` };
      }

      const attackerPassiveMods = passiveStatMods(attacker, attackerState);
      const attackerSkillMods = normalizeStatMods(attackerState?.skillStatMods);
      const attackerManualMods = normalizeStatMods(attackerState?.manualStatMods);
      const defenderPassiveMods = passiveStatMods(defender, defenderState);
      const defenderManualMods = normalizeStatMods(defenderState?.manualStatMods);
      const attackerStats = finalBattleStats(attacker, attackerState, mergeStatMods(attackerPassiveMods, attackerSkillMods, attackerManualMods));
      const defenderStats = finalBattleStats(defender, defenderState, mergeStatMods(defenderPassiveMods, defenderManualMods));
      const mode = damageMode(battleAction, attackerStats, defenderStats);
      const attackValue = attackerStats[mode.attackKey];
      const defenseValue = defenderStats[mode.defenseKey];
      const traitEffects = window.LKWG_PVP_TRAIT_RULES.resolveTraitEffects(attacker, attackerState?.traitLayers, battleAction);
      const currentSkillCost = Math.max(0, Number(attackerState?.skillCostOverrides?.[battleAction.id] ?? battleAction.pp) || 0);
      const traitAdjustedSkillCost = Math.max(0, currentSkillCost - traitEffects.skillCostReduction);
      const attackerEnergy = Number(attackerState?.energy ?? DEFAULT_PVP_ENERGY);
      const traitAdjustedEnergy = Math.max(0, Math.min(10, (Number.isFinite(attackerEnergy) ? attackerEnergy : DEFAULT_PVP_ENERGY) + traitEffects.energyGain));
      const variableDamage = window.LKWG_PVP_DAMAGE_RULES?.resolvePvpVariableDamage
        ? window.LKWG_PVP_DAMAGE_RULES.resolvePvpVariableDamage(battleAction, {
            attackerStats,
            defenderStats,
            attackerEnergy: traitAdjustedEnergy,
            defenderEnergy: defenderState?.energy,
            attackerHpPercent: attackerState?.hpPercent ?? 100,
            defenderHpPercent: defenderState?.hpPercent ?? 100,
            attackerSelectedSkills: selectedPvpSkills(attackerState),
            defenderSelectedSkills: selectedPvpSkills(defenderState),
            skillIndex: attackerState?.pvpSkillIndex,
            currentSkillCost: traitAdjustedSkillCost,
            skillUseCount: attackerState?.skillUseCounts?.[battleAction.id] ?? 0,
            statusLayers: defenderState?.statusLayers || {},
            relatedTypeSkillUseCount: attackerState?.relatedTypeSkillUseCounts?.[battleAction.type] ?? 0,
            entryCount: attackerState?.entryCounts?.[battleAction.id] ?? attackerState?.entryCount ?? 0,
            defenderSwitched: !!defenderState?.switchedThisTurn,
            attackerHasDebuff: !!attackerState?.hasDebuff,
            weatherType: (typeof state === "object" && state ? state.pvpWeatherType : null),
            burstActive: !!attackerState?.burstActive,
            burstEffectCount: attackerState?.burstEffectCount ?? 0,
            previousUsedStatusSkill: !!attackerState?.previousUsedStatusSkill,
            previousResponseSuccess: !!attackerState?.previousResponseSuccess,
            turnsWithoutDamage: attackerState?.turnsWithoutDamage ?? 0,
            defeatCount: attackerState?.defeatCounts?.[battleAction.id] ?? attackerState?.defeatCount ?? 0,
            defenderFaintedCount: defenderState?.faintedCount ?? 0,
            teamSkillCopies: attackerState?.teamSkillCopies || {},
            respondedSkillPower: defenderState?.respondedSkillPower ?? 0,
            responseSuccessCount: attackerState?.responseSuccessCount ?? 0,
            positionChangeCount: attackerState?.positionChangeCounts?.[battleAction.id] ?? attackerState?.positionChangeCount ?? 0,
            otherTypeSkillUseCount: attackerState?.otherTypeSkillUseCounts?.[battleAction.id] ?? attackerState?.otherTypeSkillUseCount ?? 0,
            adjacentSkillPowers: attackerState?.adjacentSkillPowers?.[battleAction.id] || [],
            defenderTurnsWithoutSkillDamage: defenderState?.turnsWithoutSkillDamage ?? 0,
            defenderMixedBlood: !!defenderState?.mixedBlood || bloodlineMatchesName(defenderState, /混合/),
            defaultEnergy: DEFAULT_PVP_ENERGY
          })
        : { power: basePower, hitCount: 1, damageMultiplier: 1, labels: [] };
      const damageAction = variableDamage.type && variableDamage.type !== battleAction.type
        ? { ...battleAction, type: variableDamage.type }
        : battleAction;
      const rawTypeMultiplier = combinedDefenseMultiplier(damageAction.type, defender.types || []);
      const typeMultiplier = variableDamage.ignoreResistance && rawTypeMultiplier < 1
        ? 1
        : rawTypeMultiplier;
      const responseTypeMultiplier = (variableDamage.responseIgnoreResistance || variableDamage.ignoreResistance) && rawTypeMultiplier < 1
        ? 1
        : typeMultiplier;
      const stabMultiplier = sameTypeAttackBonus(damageAction, attacker);
      const traitAdjustedPower = (value) => Math.max(1, Math.floor(
        ((Number(value) || basePower) + traitEffects.flatPower) * traitEffects.powerMultiplier
      ));
      const variablePower = traitAdjustedPower(variableDamage.power);
      const baseHitCount = Math.max(1, Number(variableDamage.hitCount) || 1);
      const manualHitCountBonus = Math.max(0, Math.round(Number(attackerState?.manualHitCountBonus) || 0));
      const hitCountBonus = traitEffects.hitCountAdd + manualHitCountBonus;
      const hitCount = Math.max(1, baseHitCount + (baseHitCount > 1 ? hitCountBonus : 0));
      const passiveDamage = passiveDamageEffects({
        attacker,
        defender,
        attackerState,
        defenderState,
        action: damageAction,
        attackerStats,
        defenderStats,
        typeMultiplier
      });
      const power = Math.max(1, Math.floor((variablePower + passiveDamage.powerAdd) * passiveDamage.powerMultiplier));
      const manualDamageBonus = Number(attackerState?.manualDamageBonus) || 0;
      const manualPowerPercentBonus = Number(attackerState?.manualPowerPercentBonus) || 0;
      const manualPowerMultiplier = Math.max(0, 1 + manualPowerPercentBonus);
      const defenseReduction = defenseReductionMultiplier(pvpActionFromState(defenderState, defender));
      const settledPower = Math.max(1, Math.floor((power + manualDamageBonus) * manualPowerMultiplier));
      const rawBase = (attackValue / Math.max(1, defenseValue)) * settledPower * PVP_DAMAGE_CORE_FACTOR;
      const adjusted = rawBase * typeMultiplier * stabMultiplier * passiveDamage.damageMultiplier * (Number(variableDamage.damageMultiplier) || 1) * defenseReduction;
      const singleEstimate = Math.max(1, Math.floor(adjusted));
      const estimate = Math.max(1, singleEstimate * hitCount);
      const responsePowerSource = variableDamage.responsePower
        ? traitAdjustedPower(variableDamage.responsePower)
        : (Number(variableDamage.responseDamageMultiplier) && Number(variableDamage.responseDamageMultiplier) !== 1 ? variablePower : null);
      const responseDamageMultiplier = Number(variableDamage.responseDamageMultiplier) || 1;
      const responsePower = responsePowerSource
        ? Math.max(1, Math.floor((responsePowerSource + passiveDamage.powerAdd) * passiveDamage.powerMultiplier))
        : null;
      const responseSettledPower = responsePower == null
        ? null
        : Math.max(1, Math.floor((responsePower + manualDamageBonus) * manualPowerMultiplier));
      const responseSingleEstimate = responsePower
        ? Math.max(1, Math.floor((attackValue / Math.max(1, defenseValue)) * responseSettledPower * PVP_DAMAGE_CORE_FACTOR * responseTypeMultiplier * stabMultiplier * passiveDamage.damageMultiplier * (Number(variableDamage.damageMultiplier) || 1) * responseDamageMultiplier * defenseReduction))
        : null;
      const responseEstimate = battleAction.id === "pvp-force-impact"
        ? Math.max(1, Math.floor(estimate * FORCE_IMPACT_RESPONSE_MULTIPLIER))
        : (responseSingleEstimate == null ? null : Math.max(1, responseSingleEstimate * hitCount));
      return {
        attacker,
        defender,
        action: damageAction,
        mode,
        basePower,
        power,
        responsePower,
        responseDamageMultiplier,
        typeMultiplier,
        stabMultiplier,
        passiveDamageMultiplier: passiveDamage.damageMultiplier,
        defenseReduction,
        damageFactor: PVP_DAMAGE_CORE_FACTOR,
        singleEstimate,
        responseSingleEstimate,
        hitCount,
        estimate,
        responseEstimate,
        defenderHp: defenderStats.hp,
        percent: Math.round((estimate / Math.max(1, defenderStats.hp)) * 100),
        responsePercent: responseEstimate == null ? null : Math.round((responseEstimate / Math.max(1, defenderStats.hp)) * 100),
        manualDamageBonus,
        manualPowerPercentBonus,
        manualHitCountBonus,
        attackerPassiveLabels: passiveModLabels(attackerPassiveMods),
        attackerSkillLabels: passiveModLabels(attackerSkillMods),
        attackerManualLabels: passiveModLabels(attackerManualMods),
        defenderPassiveLabels: passiveModLabels(defenderPassiveMods),
        defenderManualLabels: passiveModLabels(defenderManualMods),
        attackerDamageLabels: [...effectiveAction.labels, ...passiveDamage.attackerLabels],
        defenderDamageLabels: passiveDamage.defenderLabels,
        variableDamageLabels: variableDamage.labels || []
      };
    }

    function multiplierText(value) {
      if (value === 1) return "1x";
      if (value === 0.25) return "0.25x";
      if (value === 0.5) return "0.5x";
      if (value === 2) return "2x";
      if (value === 4) return "4x";
      return `${Number(value).toFixed(2)}x`;
    }

    function renderPvpTraitBonus(label) {
      return `<span class="pvp-trait-bonus">${escapeHtml(label)}</span>`;
    }

    function renderPvpBonusGroups(damage) {
      const traitText = [
        ...damage.attackerPassiveLabels.map((label) => renderPvpTraitBonus(`己方${label}`)),
        ...damage.defenderPassiveLabels.map((label) => renderPvpTraitBonus(`敌方${label}`)),
        ...damage.attackerDamageLabels.map((label) => renderPvpTraitBonus(`己方${label}`)),
        ...damage.defenderDamageLabels.map((label) => renderPvpTraitBonus(`敌方${label}`))
      ].join("，");
      const ruleText = damage.variableDamageLabels.map((label) => escapeHtml(label)).join("，");
      const bonusText = [
        ...damage.attackerSkillLabels.map((label) => escapeHtml(`技能${label}`)),
        ...damage.attackerManualLabels.map((label) => escapeHtml(`己方手动${label}`)),
        ...(damage.manualDamageBonus ? [escapeHtml(`己方手动技能威力${damage.manualDamageBonus > 0 ? "+" : ""}${damage.manualDamageBonus}`)] : []),
        ...(damage.manualPowerPercentBonus ? [escapeHtml(`己方手动技能威力${manualBuffText(damage.manualPowerPercentBonus)}`)] : []),
        ...(damage.manualHitCountBonus ? [escapeHtml(`己方手动连击数+${damage.manualHitCountBonus}`)] : []),
        ...damage.defenderManualLabels.map((label) => escapeHtml(`敌方手动${label}`))
      ].join("，");
      return { bonusText, ruleText, traitText };
    }

    function pvpDamageAmountText(damage, value = damage.estimate, singleValue = damage.singleEstimate) {
      if (damage.hitCount > 1) {
        return `${singleValue}×${damage.hitCount} = ${value}`;
      }
      return String(value);
    }

    function renderPvpDamageResult(side) {
      const state = pvpSideState(side);
      const opponentState = pvpSideState(side === "ally" ? "enemy" : "ally");
      const monster = monsterById.get(state.monsterId);
      const opponent = monsterById.get(opponentState.monsterId);
      if (!monster) {
        return `<div class="pvp-damage-result warn" data-pvp-damage-result="${side}">请选择${side === "ally" ? "己方" : "敌方"}精灵</div>`;
      }
      if (!opponent) {
        return `<div class="pvp-damage-result warn" data-pvp-damage-result="${side}">请先选择${side === "ally" ? "敌方" : "己方"}精灵</div>`;
      }
      const action = pvpActionFromState(state, monster);
      if (!action) {
        if (state.supportText) {
          const labels = passiveModLabels(state.skillStatMods);
          return `<div class="pvp-damage-result" data-pvp-damage-result="${side}">已记录${escapeHtml(state.supportText)}，点击攻击技能后计算伤害${labels.length ? `（当前技能增益：${escapeHtml(labels.join(" / "))}）` : ""}</div>`;
        }
        return `<div class="pvp-damage-result" data-pvp-damage-result="${side}">点击技能后显示伤害</div>`;
      }
      const damage = calcPvpDamage(state, opponentState, action);
      if (damage?.error) {
        return `<div class="pvp-damage-result bad" data-pvp-damage-result="${side}">${escapeHtml(damage.error)}</div>`;
      }
      if (!damage) {
        return `<div class="pvp-damage-result warn" data-pvp-damage-result="${side}">伤害数据不足</div>`;
      }
      const { bonusText, ruleText, traitText } = renderPvpBonusGroups(damage);
      const stabText = damage.stabMultiplier > 1 ? ` / 本系${multiplierText(damage.stabMultiplier)}` : "";
      const ruleTextPart = ruleText ? ` / 规则：${ruleText}` : "";
      const powerText = damage.basePower !== damage.power ? `${damage.basePower}→${damage.power}` : damage.power;
      if (damage.responseEstimate != null) {
        const responseReason = damage.action.id === "pvp-force-impact"
          ? `敌方使用状态技能时 ×${FORCE_IMPACT_RESPONSE_MULTIPLIER}`
          : `应对状态威力${damage.responsePower}${damage.responseDamageMultiplier && damage.responseDamageMultiplier !== 1 ? ` / 伤害×${damage.responseDamageMultiplier}` : ""}`;
        return `
          <div class="pvp-damage-result" data-pvp-damage-result="${side}">
            <div class="pvp-damage-lines">
              <div class="pvp-damage-line">
                <strong>${escapeHtml(damage.action.name)}：${pvpDamageAmountText(damage)}（扣除${damage.percent}%生命）</strong>
                <span>${typeName(damage.action.type)} / ${damage.mode.label} / 威力${powerText} / 克制${multiplierText(damage.typeMultiplier)}${stabText}${ruleTextPart}${bonusText ? ` / 增益：${bonusText}` : ""}</span>
              </div>
              ${traitText ? `<div class="pvp-damage-line pvp-damage-trait-line"><span>特性：${traitText}</span></div>` : ""}
              <div class="pvp-damage-line">
                <strong>${escapeHtml(damage.action.name)}：${pvpDamageAmountText(damage, damage.responseEstimate, damage.responseSingleEstimate || damage.responseEstimate)}（扣除${damage.responsePercent}%生命，应对状态）</strong>
                <span>${responseReason}</span>
              </div>
            </div>
          </div>
        `;
      }
      return `
        <div class="pvp-damage-result" data-pvp-damage-result="${side}">
          <strong>${escapeHtml(damage.action.name)}：${pvpDamageAmountText(damage)}（扣除${damage.percent}%生命）</strong>
          <span>${typeName(damage.action.type)} / ${damage.mode.label} / 威力${powerText} / 克制${multiplierText(damage.typeMultiplier)}${stabText}${ruleTextPart}${bonusText ? ` / 增益：${bonusText}` : ""}</span>
          ${traitText ? `<span class="pvp-damage-trait-line">特性：${traitText}</span>` : ""}
        </div>
      `;
    }

    function monsterNoValue(monster) {
      const value = Number.parseInt(monster?.raw?.no, 10);
      return Number.isFinite(value) ? value : 0;
    }

    function isBossVariant(monster) {
      if (monster?.isGeneratedBossForm || monster?.raw?.isGeneratedBossForm) return true;
      if (REAL_BOSS_FORM_NAMES.has(monster?.name || "")) return true;
      const image = monster?.raw?.image_url || monster?.icon || "";
      const tags = [
        monster?.raw?.form,
        monster?.raw?.variant,
        monster?.raw?.type,
        monster?.raw?.rarity,
        ...(monster?.raw?.tags || [])
      ].join(" ");
      return /boss|leader/i.test(`${image} ${tags}`) || /首领|Boss|BOSS/.test(monster?.name || "");
    }

    function isGeneratedBossForm(monster) {
      return Boolean(monster?.isGeneratedBossForm || monster?.raw?.isGeneratedBossForm || String(monster?.id || "").endsWith(BOSS_FORM_SUFFIX));
    }

    function evolutionGroupKey(monster) {
      return monster?.raw?.chainId
        || monster?.raw?.evolutionChainId
        || monster?.raw?.evolution_chain_id
        || monster?.raw?.familyId
        || monster?.raw?.family_id
        || monster?.raw?.baseId
        || monster?.raw?.base_id
        || monster?.raw?.no
        || monster?.id
        || "";
    }

    function evolutionStageValue(monster) {
      const raw = monster?.raw || {};
      const candidates = [
        raw.stage,
        raw.evolutionStage,
        raw.evolution_stage,
        raw.evoStage,
        raw.rank
      ];
      for (const value of candidates) {
        const parsed = Number.parseInt(value, 10);
        if (Number.isFinite(parsed)) return parsed;
      }
      return 0;
    }

    function bestEvolutionRepresentative(monsters) {
      const normalForms = monsters.filter((monster) => !isBossVariant(monster));
      const pool = normalForms.length ? normalForms : monsters;
      return pool.slice().sort((a, b) => (
        evolutionStageValue(b) - evolutionStageValue(a)
        || monsterStatTotal(b) - monsterStatTotal(a)
        || monsterNoValue(b) - monsterNoValue(a)
        || b.name.localeCompare(a.name, "zh-CN")
      ))[0];
    }

    function compactFinalLearners(learners) {
      const grouped = new Map();
      for (const monster of learners) {
        const key = evolutionGroupKey(monster);
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(monster);
      }
      return [...grouped.values()]
        .map(bestEvolutionRepresentative)
        .filter(Boolean)
        .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
    }

    function getSkillLearners(skillId, excludeMonsterId = "") {
      if (!skillId) return [];
      return dexData.monsters.filter((monster) => (
        monster.id !== excludeMonsterId && (monster.skillIds || []).includes(skillId)
      ));
    }

    function learnerTeamMatches(team, learners) {
      const ids = new Set(learners.map((monster) => monster.id));
      const groups = new Set(learners.map(evolutionGroupKey));
      return team
        .map((pet, petIndex) => ({ pet, petIndex, monster: monsterById.get(pet.monsterId) }))
        .filter((item) => item.monster && (ids.has(item.monster.id) || groups.has(evolutionGroupKey(item.monster))));
    }

    function learnerChoice(team, learners) {
      const teamMatches = learnerTeamMatches(team, learners);
      if (teamMatches.length) {
        return {
          monster: teamMatches[0].monster,
          petIndex: teamMatches[0].petIndex,
          fromTeam: true,
          teamMatches
        };
      }
      return {
        monster: learners[0] || null,
        petIndex: null,
        fromTeam: false,
        teamMatches: []
      };
    }

    function buildRollerCandidate(team, petIndex, monster, passive, skill, scored, sourceNote = "", options = {}) {
      if (!skill) return null;
      const nativeSkillIds = new Set(monster.skillIds || []);
      const isNative = nativeSkillIds.has(skill.id);
      if (isNative && !options.allowNative) return null;
      const rawLearners = getSkillLearners(skill.id, monster.id);
      const learners = compactFinalLearners(rawLearners);
      if (!rawLearners.length && !options.allowNoLearners) return null;
      const choice = learnerChoice(team, rawLearners);
      return {
        petIndex,
        petName: monster.name,
        monster,
        passive,
        skill,
        score: scored.score,
        reasons: scored.reasons || [],
        sourceNote,
        isNative,
        rawLearners,
        learners,
        learner: choice.monster,
        learnerPetIndex: choice.petIndex,
        learnerFromTeam: choice.fromTeam,
        teamLearners: choice.teamMatches
      };
    }

    function buildManualRollerCandidate(team, pet, petIndex, monster, passives) {
      const skill = skillById.get(pet.rollerSkillId);
      if (!skill) return null;
      const nativeSkillIds = new Set(monster.skillIds || []);
      const passive = passives[0] || { name: "特性", description: "" };
      const scored = scoreSuperSkill(monster, passive, skill) || { score: 300, reasons: [] };
      const reason = scored.reasons.length
        ? scored.reasons
        : [`你在阵容输入里指定了 ${skill.name}，这里按过山车目标技能优先展示。`];
      return buildRollerCandidate(team, petIndex, monster, passive, skill, {
        score: nativeSkillIds.has(skill.id) ? 120 : Math.max(scored.score, 300),
        reasons: reason
      }, "手动指定", { allowNative: true, allowNoLearners: true });
    }

    function buildRollerSuperRecommendations(team) {
      return team.map((pet, petIndex) => {
        const monster = monsterById.get(pet.monsterId);
        if (!monster) return null;
        const passives = getMonsterPassives(monster);
        return buildManualRollerCandidate(team, pet, petIndex, monster, passives);
      });
    }

    function renderRollerLearners(rec) {
      const learners = rec.learners || [];
      if (!learners.length) {
        return `
          <div class="roller-learners empty">
            <div class="roller-meta">可学习：暂无合法来源</div>
          </div>
        `;
      }
      const preview = learners.slice(0, 4).map((monster) => monster.name).join("、")
        + (learners.length > 4 ? ` 等${learners.length}只` : "");
      const list = learners.map((monster) => `
        <div class="roller-learner-item">
          ${iconHtml(monster, "combo-icon")}
          <span class="roller-learner-name">${escapeHtml(monster.name)}</span>
        </div>
      `).join("");
      const stripList = learners.slice(0, 2).map((monster) => `
        <div class="roller-learner-item">
          ${iconHtml(monster, "combo-icon")}
          <span class="roller-learner-name">${escapeHtml(monster.name)}</span>
        </div>
      `).join("");
      return `
        <div class="roller-learners">
          <details>
            <summary>
              <span>可学习该技能的精灵 ${learners.length}只</span>
              <span class="roller-learner-preview">${escapeHtml(preview)}</span>
              <span class="roller-learner-arrow">▼</span>
            </summary>
            <div class="roller-learner-grid">${list}</div>
          </details>
          <div class="roller-learner-strip">${stripList}</div>
        </div>
      `;
    }

    function renderRollerSkillPicker(pet, petIndex) {
      const monster = monsterById.get(pet.monsterId);
      if (!monster) return "";
      return `<div class="roller-skill-picker" data-roller-skill-picker="${petIndex}"></div>`;
    }

    function renderRollerSlot(team, rec, pet, petIndex) {
      const monster = monsterById.get(pet.monsterId);
      if (!monster) {
        return `
          <div class="roller-slot empty">
            <div class="roller-slot-head">
              <span class="pet-index">${petIndex + 1}</span>
              <div class="roller-slot-title">${petIndex + 1}号位<span>未选择精灵</span></div>
            </div>
          </div>
        `;
      }
      if (!rec) {
        return `
          <div class="roller-slot no-rec">
            <div class="roller-slot-head">
              ${iconHtml(monster, "combo-icon")}
              <div class="roller-slot-title">${petIndex + 1}号位 ${escapeHtml(monster.name)}<span>未选择过山车技能</span></div>
            </div>
            ${renderRollerSkillPicker(pet, petIndex)}
          </div>
        `;
      }
      return `
        <div class="roller-slot">
          <div class="roller-slot-head">
            ${iconHtml(rec.monster, "combo-icon")}
            <div class="roller-slot-title">${petIndex + 1}号位 ${escapeHtml(rec.petName)}</div>
          </div>
          ${renderRollerSkillPicker(pet, petIndex)}
          ${renderRollerLearners(rec)}
        </div>
      `;
    }

    function hydrateRollerSkillPickers(team) {
      document.querySelectorAll("[data-roller-skill-picker]").forEach((host) => {
        const petIndex = Number.parseInt(host.dataset.rollerSkillPicker, 10);
        const sourceCombo = teamGrid.querySelector(`[data-pet="${petIndex}"] [data-combo="rollerSkill"]`);
        if (!sourceCombo) return;
        const pet = team[petIndex];
        const monster = monsterById.get(pet?.monsterId);
        const selectedRollerSkill = skillById.get(pet?.rollerSkillId);
        createCombo(host, {
          items: dexData.skills,
          value: pet?.rollerSkillId || "",
          selectedItem: selectedRollerSkill || null,
          placeholder: monster ? "搜索任意技能" : "请先选择精灵",
          emptyText: "未选择过山车技能",
          disabled: !monster,
          onSelect: (item) => {
            sourceCombo.dataset.value = item?.id || "";
            saveTeam();
            renderResults();
          }
        });
      });
    }

    function renderRollerSuperModule(team) {
      const recs = buildRollerSuperRecommendations(team);
      const cards = team.map((pet, petIndex) => renderRollerSlot(team, recs[petIndex], pet, petIndex)).join("");
      return `
        <article class="analysis-card">
          <h3>精灵技能池查询</h3>
          <div class="roller-list">${cards}</div>
        </article>
      `;
    }

    function renderAnalysis(team) {
      const slots = attackSkillSlots(team);
      const attackTypes = slots.map((slot) => slot.type);
      const covered = coverageOfTypes(attackTypes);
      const missing = missingTargets(attackTypes);
      const byType = new Map();
      for (const slot of slots) {
        if (!byType.has(slot.type)) byType.set(slot.type, []);
        byType.get(slot.type).push(slot);
      }
      const duplicateGroups = [...byType.entries()].filter(([, group]) => group.length > 1);
      const suggestions = greedySuggestions(attackTypes, missing);

      const repeatHtml = duplicateGroups.length
        ? duplicateGroups.map(([type, group]) => {
          const groupText = group
            .map((slot) => `${slot.petName} 技能${slot.skillIndex + 1}(${slot.skill.name})`)
            .join("、");
          const replacementLines = group.slice(1).map((slot) => {
            const replacement = bestReplacement(attackTypes, slot.type);
            const targets = replacement.newTargets.length
              ? `新增克制 ${replacement.newTargets.map(typeName).join("、")}`
              : "当前克制面已无明显空缺";
            return `${slot.petName} 技能${slot.skillIndex + 1} 可考虑改为 ${typeName(replacement.type)}属性技能，${targets}`;
          });
          return `
            <div class="notice warn">
              <strong>${typeName(type)}重复：</strong>${groupText}
              <div class="line">${replacementLines.join("；")}</div>
            </div>
          `;
        }).join("")
        : '<div class="notice good">攻击技能属性没有重复。</div>';

      const missingHtml = missing.length
        ? `
          <div class="notice warn">
            <strong>总体缺少克制目标：</strong>${missing.map(typeName).join("、")}
            <div class="line">建议补充：${suggestions.length
              ? suggestions.map((item) => `${typeName(item.type)}（补 ${item.covered.map(typeName).join("、")}）`).join("；")
              : "暂无可补充项"}</div>
          </div>
        `
        : '<div class="notice good">总体攻击技能已经覆盖全部可克制属性。</div>';

      return `
        <article class="analysis-card">
          <h3>阵容缺陷</h3>
          <div class="analysis-list">
            ${repeatHtml}
            ${missingHtml}
            <div class="notice">
              <strong>当前克制面：</strong>${covered.length ? covered.map(typeName).join("、") : "无"}
            </div>
          </div>
        </article>
      `;
    }

    function pvpSideState(side) {
      const state = pvpSimState[side] || pvpSimState.ally;
      state.side = side;
      if (!Array.isArray(state.talentIds)) {
        state.talentIds = [state.talentId || "", "", ""];
      }
      state.talentIds = Array.from({ length: 3 }, (_, index) => state.talentIds[index] || "");
      if (!Array.isArray(state.skillIds)) {
        state.skillIds = ["", "", "", ""];
      }
      state.skillIds = Array.from({ length: 4 }, (_, index) => state.skillIds[index] || "");
      state.action = typeof state.action === "string" ? state.action : "";
      if (state.forceImpact && !state.action) state.action = "force";
      if (forceImpactLocked(state) && state.action === "force") state.action = "";
      state.forceImpact = state.action === "force";
      state.skillStatMods = normalizeStatMods(state.skillStatMods);
      state.manualStatMods = normalizeStatMods(state.manualStatMods);
      state.manualDamageBonus = Number.isFinite(Number(state.manualDamageBonus)) ? Number(state.manualDamageBonus) : 0;
      state.manualPowerPercentBonus = Number.isFinite(Number(state.manualPowerPercentBonus)) ? Number(state.manualPowerPercentBonus) : 0;
      state.manualHitCountBonus = Math.max(0, Math.round(Number(state.manualHitCountBonus) || 0));
      state.usedSupportSkillIds = unique(Array.isArray(state.usedSupportSkillIds) ? state.usedSupportSkillIds : []);
      state.supportText = state.supportText || "";
      state.energy = Number.isFinite(Number(state.energy)) ? Number(state.energy) : DEFAULT_PVP_ENERGY;
      state.traitLayers = window.LKWG_PVP_TRAIT_RULES.normalizeTraitLayers(state.traitLayers);
      return state;
    }

    function selectedTeamMonsters(team) {
      const seen = new Set();
      return team
        .map((pet) => monsterById.get(pet.monsterId))
        .filter((monster) => {
          if (!monster || seen.has(monster.id)) return false;
          seen.add(monster.id);
          return true;
        });
    }

    function prioritizedAllyMonsters(team) {
      const selected = selectedTeamMonsters(team);
      if (!selected.length) return dexData.monsters;
      const selectedIds = new Set(selected.map((monster) => monster.id));
      return [...selected, ...dexData.monsters.filter((monster) => !selectedIds.has(monster.id))];
    }

    function allyMonsterItemsForQuery(team, query) {
      const selected = selectedTeamMonsters(team);
      if (!selected.length) return query.trim() ? fuzzyMonsterItems(query, dexData.monsters) : dexData.monsters;
      return query.trim()
        ? fuzzyMonsterItems(query, prioritizedAllyMonsters(team))
        : selected;
    }

    function enemyMonsterItemsForQuery(query) {
      return query.trim() ? fuzzyMonsterItems(query, dexData.monsters) : dexData.monsters;
    }

    function teamPetForMonster(team, monsterId) {
      return normalizeTeam(team).find((pet) => pet.monsterId === monsterId) || null;
    }

    function talentIdFromText(text) {
      if (/HP/i.test(text)) return "talent-hp";
      if (/物攻/.test(text)) return "talent-atk";
      if (/物防/.test(text)) return "talent-def";
      if (/魔攻/.test(text)) return "talent-spa";
      if (/魔防/.test(text)) return "talent-spd";
      if (/速度/.test(text)) return "talent-spe";
      return "";
    }

    function clearPvpSideState(state) {
      state.monsterId = "";
      state.bloodlineId = "";
      state.natureId = "";
      state.talentIds = ["", "", ""];
      state.skillIds = ["", "", "", ""];
      state.action = "";
      state.forceImpact = false;
      resetPvpManualBuffs(state);
      state.energy = DEFAULT_PVP_ENERGY;
      state.traitLayers = 0;
    }

    function resetPvpManualBuffs(state) {
      state.skillStatMods = blankStatMods();
      state.manualStatMods = blankStatMods();
      state.manualDamageBonus = 0;
      state.manualPowerPercentBonus = 0;
      state.manualHitCountBonus = 0;
      state.usedSupportSkillIds = [];
      state.supportText = "";
    }

    function resetPvpTraitLayers(state, monster) {
      state.traitLayers = window.LKWG_PVP_TRAIT_RULES.defaultTraitLayers(monster);
    }

    function applyTeamPetToPvpSide(state, pet, monster) {
      state.bloodlineId = bloodlineById.has(pet.bloodlineId) ? pet.bloodlineId : "";
      state.natureId = PVP_NATURES.some((nature) => nature.id === pet.natureId) ? pet.natureId : "";
      state.talentIds = Array.from({ length: 3 }, (_, index) => (
        PVP_TALENTS.some((talent) => talent.id === pet.talentIds?.[index]) ? pet.talentIds[index] : ""
      ));
      state.skillIds = Array.from({ length: 4 }, (_, index) => (
        skillById.has(pet.skills?.[index]?.skillId) ? pet.skills[index].skillId : ""
      ));
    }

    function renderMonsterPreview(monster) {
      if (!monster?.icon) {
        return '<div class="monster-preview empty">未选择精灵</div>';
      }
      return `
        <div class="monster-preview">
          <img src="${escapeHtml(monster.icon)}" alt="${escapeHtml(monster.name)}">
        </div>
      `;
    }

    function renderPvpPanelStats(monster, state, side = "") {
      if (!monster) {
        return `<div class="readonly-line pvp-panel-stats" data-pvp-panel-stats="${side}"><span class="tag empty">未选择精灵</span></div>`;
      }
      const stats = finalBattleStats(monster, state, blankStatMods());
      const rows = [
        ["生命", stats.hp],
        ["物攻", stats.atk],
        ["物防", stats.defense],
        ["魔攻", stats.spa],
        ["魔防", stats.spd],
        ["速度", stats.spe]
      ];
      return `
        <div class="pvp-panel-stats" data-pvp-panel-stats="${side}">
          <div class="stat-grid">
            ${rows.map(([label, value]) => `
              <div class="stat-cell">
                <span class="stat-label">${escapeHtml(label)}</span>
                <span class="stat-value">${Number(value) || 0}</span>
              </div>
            `).join("")}
          </div>
          <div class="pvp-default-note">未选择性格、天分时，默认${escapeHtml(DEFAULT_DAMAGE_NATURE_TEXT)}、${escapeHtml(DEFAULT_DAMAGE_TALENT_TEXT)}。</div>
        </div>
      `;
    }

    function manualBuffPercent(value) {
      return Math.round((Number(value) || 0) * 100);
    }

    function manualBuffText(value) {
      const percent = manualBuffPercent(value);
      return percent > 0 ? `+${percent}%` : `${percent}%`;
    }

    function manualFlatBuffText(value) {
      const amount = Math.round(Number(value) || 0);
      return amount > 0 ? `+${amount}` : `${amount}`;
    }

    function manualLayerBuffText(value) {
      return `${Math.max(0, Math.round(Number(value) || 0))}层`;
    }

    function manualBuffStatValue(state, mods, stat) {
      if (stat.flat) return Number(state?.manualDamageBonus) || 0;
      if (stat.powerPercent) return Number(state?.manualPowerPercentBonus) || 0;
      if (stat.hitCount) return Math.max(0, Math.round(Number(state?.manualHitCountBonus) || 0));
      return mods[stat.key];
    }

    function manualBuffStatText(value, stat) {
      if (stat.flat) return manualFlatBuffText(value);
      if (stat.hitCount) return manualLayerBuffText(value);
      return manualBuffText(value);
    }

    function manualBuffStepText(stat, delta) {
      const sign = delta > 0 ? "+" : "-";
      if (stat.flat) return `${sign}${PVP_MANUAL_DAMAGE_STEP}`;
      if (stat.hitCount) return `${sign}1层`;
      return `${sign}10%`;
    }

    function manualBuffClass(value) {
      const amount = Number(value) || 0;
      if (amount > 0) return "positive";
      if (amount < 0) return "negative";
      return "";
    }

    function renderPvpManualBuffPanel(side, state) {
      const mods = mergeStatMods(state?.skillStatMods, state?.manualStatMods);
      const monster = monsterById.get(state?.monsterId);
      const traitRule = window.LKWG_PVP_TRAIT_RULES.resolveTraitRule(monster);
      const traitName = window.LKWG_PVP_TRAIT_RULES.traitName(monster);
      const traitLayers = window.LKWG_PVP_TRAIT_RULES.normalizeTraitLayers(state?.traitLayers);
      return `
        <div class="pvp-buff-panel" data-pvp-buff-panel="${side}">
          <div class="pvp-buff-title">增益状态</div>
          <div class="pvp-buff-grid">
            ${PVP_MANUAL_BUFF_STATS.map((stat) => `
              <div class="pvp-buff-item" data-pvp-buff-stat="${stat.key}">
                <div class="pvp-buff-label">${escapeHtml(stat.label)}</div>
                <div class="pvp-buff-controls">
                  <button class="pvp-buff-button" type="button" data-pvp-buff="${side}" data-stat="${stat.key}" data-delta="-1" title="${escapeHtml(stat.label)}${manualBuffStepText(stat, -1)}">-</button>
                  <span class="pvp-buff-value ${manualBuffClass(manualBuffStatValue(state, mods, stat))}" data-pvp-buff-value="${side}-${stat.key}">${manualBuffStatText(manualBuffStatValue(state, mods, stat), stat)}</span>
                  <button class="pvp-buff-button" type="button" data-pvp-buff="${side}" data-stat="${stat.key}" data-delta="1" title="${escapeHtml(stat.label)}${manualBuffStepText(stat, 1)}">+</button>
                </div>
              </div>
            `).join("")}
          </div>
          ${traitRule ? `
            <div class="pvp-trait-layer-row">
              <div class="pvp-trait-layer-copy">
                <strong>特性层数 · ${escapeHtml(traitName)}</strong>
              </div>
              <div class="pvp-buff-controls">
                <button class="pvp-buff-button" type="button" data-pvp-trait-layer="${side}" data-delta="-1">-</button>
                <span class="pvp-buff-value" data-pvp-trait-layer-value="${side}">${traitLayers}</span>
                <button class="pvp-buff-button" type="button" data-pvp-trait-layer="${side}" data-delta="1">+</button>
              </div>
            </div>
          ` : ""}
        </div>
      `;
    }

    function refreshPvpManualBuffPanel(root, side) {
      const state = pvpSideState(side);
      const mods = mergeStatMods(state.skillStatMods, state.manualStatMods);
      PVP_MANUAL_BUFF_STATS.forEach((stat) => {
        const valueEl = root.querySelector(`[data-pvp-buff-value="${side}-${stat.key}"]`);
        if (!valueEl) return;
        const value = manualBuffStatValue(state, mods, stat);
        valueEl.textContent = manualBuffStatText(value, stat);
        valueEl.classList.toggle("positive", Number(value) > 0);
        valueEl.classList.toggle("negative", Number(value) < 0);
      });
      const traitLayerValueEl = root.querySelector(`[data-pvp-trait-layer-value="${side}"]`);
      if (traitLayerValueEl) {
        traitLayerValueEl.textContent = window.LKWG_PVP_TRAIT_RULES.normalizeTraitLayers(state.traitLayers);
      }
    }

    function renderPvpSide(side, title) {
      const state = pvpSideState(side);
      const monster = monsterById.get(state.monsterId);
      return `
        <div class="pvp-side" data-pvp-side="${side}">
          <h4>${escapeHtml(title)}</h4>
          <div class="pvp-side-form">
            <div class="field field-wide">
              <label>精灵</label>
              <div data-pvp-combo="${side}-monster"></div>
            </div>
            <div class="field">
              <label>血脉</label>
              <div data-pvp-combo="${side}-bloodline"></div>
            </div>
            <div class="field">
              <label>性格</label>
              <div data-pvp-combo="${side}-nature"></div>
            </div>
            <div class="field field-wide">
              <label>天分</label>
              <div class="talent-picks">
                ${[0, 1, 2].map((talentIndex) => `<div data-pvp-combo="${side}-talent-${talentIndex}"></div>`).join("")}
              </div>
            </div>
            <div class="field field-wide">
              <label>种族值</label>
              ${renderPvpPanelStats(monster, state, side)}
            </div>
            <div class="field field-wide">
              <label>技能</label>
              <div class="pvp-skill-picks">
                ${[0, 1, 2, 3].map((skillIndex) => `
                  <div class="pvp-skill-slot${state.action === `skill:${skillIndex}` ? " active" : ""}" data-pvp-skill-slot="${side}-${skillIndex}">
                    <div data-pvp-combo="${side}-skill-${skillIndex}"></div>
                  </div>
                `).join("")}
              </div>
              <div class="pvp-force-row">
                <button class="pvp-force-button${state.forceImpact && !forceImpactLocked(state) ? " active" : ""}" type="button" data-pvp-force="${side}" aria-pressed="${state.forceImpact && !forceImpactLocked(state) ? "true" : "false"}" ${forceImpactLocked(state) ? "disabled" : ""}>
                  <span class="pvp-force-icon-wrap">${forceImpactButtonIcon(state, monster)}</span>
                  <span>愿力冲击</span>
                </button>
              </div>
              ${renderPvpManualBuffPanel(side, state)}
            </div>
            <div class="field field-wide">
              ${renderMonsterPreview(monster)}
              ${renderPvpDamageResult(side)}
            </div>
          </div>
        </div>
      `;
    }

    function renderPvpDamageSimulation(team) {
      return `
        <article class="analysis-card pvp-damage-sim" id="pvpDamageSim">
          <h3>PVP对战伤害模拟</h3>
          <div class="pvp-sim-grid">
            ${renderPvpSide("ally", "己方精灵")}
            ${renderPvpSide("enemy", "敌方精灵")}
          </div>
        </article>
      `;
    }

    function updatePvpActionClasses(root, side) {
      const state = pvpSideState(side);
      const monster = monsterById.get(state.monsterId);
      const locked = forceImpactLocked(state);
      state.skillIds.forEach((skillId, skillIndex) => {
        const host = root.querySelector(`[data-pvp-combo="${side}-skill-${skillIndex}"]`);
        if (!host) return;
        host.classList.toggle("pvp-action-combo", Boolean(skillId));
        host.classList.toggle("active", state.action === `skill:${skillIndex}`);
        const slot = root.querySelector(`[data-pvp-skill-slot="${side}-${skillIndex}"]`);
        if (slot) {
          slot.classList.toggle("active", state.action === `skill:${skillIndex}`);
        }
      });
      const forceButton = root.querySelector(`[data-pvp-force="${side}"]`);
      if (forceButton) {
        forceButton.disabled = locked;
        forceButton.classList.toggle("active", state.action === "force" && !locked);
        forceButton.setAttribute("aria-pressed", state.action === "force" && !locked ? "true" : "false");
        const iconWrap = forceButton.querySelector(".pvp-force-icon-wrap");
        if (iconWrap) {
          iconWrap.innerHTML = forceImpactButtonIcon(state, monster);
        }
      }
    }

    function refreshPvpDamageOutputs(root) {
      ["ally", "enemy"].forEach((side) => {
        const state = pvpSideState(side);
        const monster = monsterById.get(state.monsterId);
        const statsEl = root.querySelector(`[data-pvp-panel-stats="${side}"]`);
        if (statsEl) statsEl.outerHTML = renderPvpPanelStats(monster, state, side);
        const damageEl = root.querySelector(`[data-pvp-damage-result="${side}"]`);
        if (damageEl) damageEl.outerHTML = renderPvpDamageResult(side);
        refreshPvpManualBuffPanel(root, side);
        updatePvpActionClasses(root, side);
      });
    }

    function setPvpAction(state, action) {
      state.action = state.action === action ? "" : action;
      state.forceImpact = state.action === "force";
    }

    function applyPvpSupportSkill(state, skill) {
      if (!skill || isAttackSkill(skill)) return false;
      const mods = skillStatMods(skill);
      const labels = passiveModLabels(mods);
      if (!labels.length) return false;
      state.skillStatMods = mergeStatMods(state.skillStatMods, mods);
      state.supportText = `${skill.name}：${labels.join(" / ")}`;
      state.action = "";
      state.forceImpact = false;
      return true;
    }

    function hydratePvpDamageSimulation(team) {
      const root = document.getElementById("pvpDamageSim");
      if (!root) return;

      ["ally", "enemy"].forEach((side) => {
        const state = pvpSideState(side);
        const isAlly = side === "ally";
        const selectedMonster = monsterById.get(state.monsterId);
        const monsterItems = isAlly ? prioritizedAllyMonsters(team) : dexData.monsters;
        const selectedTeam = selectedTeamMonsters(team);

        createCombo(root.querySelector(`[data-pvp-combo="${side}-monster"]`), {
          items: monsterItems,
          value: state.monsterId,
          selectedItem: selectedMonster || null,
          placeholder: isAlly && selectedTeam.length ? "优先选择阵容精灵，也可搜索精灵池" : "搜索精灵名称",
          emptyText: "未选择精灵",
          itemsForQuery: isAlly ? (query) => allyMonsterItemsForQuery(team, query) : enemyMonsterItemsForQuery,
          skipDefaultFilter: true,
          onSelect: (item) => {
            if (!item) {
              clearPvpSideState(state);
              renderResults();
              return;
            }
            const monsterChanged = state.monsterId !== item.id;
            state.monsterId = item.id;
            if (monsterChanged) resetPvpTraitLayers(state, item);
            state.action = "";
            state.forceImpact = false;
            resetPvpManualBuffs(state);
            state.energy = DEFAULT_PVP_ENERGY;
            if (isAlly) {
              const teamPet = teamPetForMonster(team, item.id);
              if (teamPet) {
                applyTeamPetToPvpSide(state, teamPet, item);
              } else {
                state.bloodlineId = "";
                state.natureId = "";
                state.talentIds = ["", "", ""];
                state.skillIds = ["", "", "", ""];
                resetPvpManualBuffs(state);
                state.energy = DEFAULT_PVP_ENERGY;
              }
            }
            renderResults();
          }
        });

        createCombo(root.querySelector(`[data-pvp-combo="${side}-bloodline"]`), {
          items: BLOODLINES,
          value: state.bloodlineId,
          placeholder: "搜索血脉名称",
          selectedPlaceholder: "",
          displayName: bloodlineShortLabel,
          emptyText: "未选择血脉",
          onSelect: (item) => {
            state.bloodlineId = item?.id || "";
            if (item?.id === "bloodline-boss") {
              state.action = "";
              state.forceImpact = false;
            }
            refreshPvpDamageOutputs(root);
          }
        });

        createCombo(root.querySelector(`[data-pvp-combo="${side}-nature"]`), {
          items: PVP_NATURES,
          value: state.natureId,
          placeholder: "选择性格",
          emptyText: "未选择性格",
          clearPlaceholderOnFocus: true,
          onSelect: (item) => {
            state.natureId = item?.id || "";
            refreshPvpDamageOutputs(root);
          }
        });

        state.talentIds.forEach((talentId, talentIndex) => {
          const talentItems = () => {
            const selectedIds = new Set(state.talentIds.filter(Boolean));
            return PVP_TALENTS.filter((talent) => talent.id === state.talentIds[talentIndex] || !selectedIds.has(talent.id));
          };
          createCombo(root.querySelector(`[data-pvp-combo="${side}-talent-${talentIndex}"]`), {
            items: talentItems(),
            value: talentId,
            placeholder: "选择天分",
            emptyText: "未选择天分",
            clearPlaceholderOnFocus: true,
            itemsForQuery: talentItems,
            onSelect: (item) => {
              state.talentIds[talentIndex] = item?.id || "";
              renderResults();
            }
          });
        });

        state.skillIds.forEach((skillId, skillIndex) => {
          const selectedSkill = skillById.get(skillId);
          createCombo(root.querySelector(`[data-pvp-combo="${side}-skill-${skillIndex}"]`), {
            items: dexData.skills,
            value: skillId,
            selectedItem: selectedSkill || null,
            placeholder: `选择技能${skillIndex + 1}`,
            emptyText: "未选择技能",
            clearPlaceholderOnFocus: true,
            itemsForQuery: fuzzySkillItems,
            skipDefaultFilter: true,
            readonlyWhenSelected: true,
            prefixHtml: `<span class="pvp-skill-index">${skillIndex + 1}</span>`,
            onSelect: (item) => {
              state.skillIds[skillIndex] = item?.id || "";
              if (item) {
                if (isAttackSkill(item)) {
                  setPvpAction(state, `skill:${skillIndex}`);
                } else if (applyPvpSupportSkill(state, item)) {
                  // Support skill release is recorded as a stack each time.
                } else {
                  setPvpAction(state, `skill:${skillIndex}`);
                }
              } else if (state.action === `skill:${skillIndex}`) {
                state.action = "";
                state.forceImpact = false;
              }
              refreshPvpDamageOutputs(root);
            }
          });
          const skillHost = root.querySelector(`[data-pvp-combo="${side}-skill-${skillIndex}"]`);
          skillHost?.addEventListener("click", (event) => {
            if (event.target.closest(".combo-clear") || event.target.closest(".combo-menu") || !state.skillIds[skillIndex]) return;
            const skill = skillById.get(state.skillIds[skillIndex]);
            if (applyPvpSupportSkill(state, skill)) {
              refreshPvpDamageOutputs(root);
              return;
            }
            setPvpAction(state, `skill:${skillIndex}`);
            refreshPvpDamageOutputs(root);
          });
        });

        const forceButton = root.querySelector(`[data-pvp-force="${side}"]`);
        forceButton?.addEventListener("click", () => {
          if (forceImpactLocked(state)) return;
          setPvpAction(state, "force");
          refreshPvpDamageOutputs(root);
        });

        root.querySelectorAll(`[data-pvp-buff="${side}"]`).forEach((button) => {
          button.addEventListener("click", () => {
            const statKey = button.dataset.stat;
            const statConfig = PVP_MANUAL_BUFF_STATS.find((stat) => stat.key === statKey);
            if (!statConfig) return;
            const delta = Number(button.dataset.delta) || 0;
            if (statConfig.flat) {
              state.manualDamageBonus = (Number(state.manualDamageBonus) || 0) + delta * PVP_MANUAL_DAMAGE_STEP;
              refreshPvpDamageOutputs(root);
              return;
            }
            if (statConfig.powerPercent) {
              const nextValue = (Number(state.manualPowerPercentBonus) || 0) + delta * PVP_MANUAL_BUFF_STEP;
              state.manualPowerPercentBonus = Math.round(nextValue * 10) / 10;
              refreshPvpDamageOutputs(root);
              return;
            }
            if (statConfig.hitCount) {
              state.manualHitCountBonus = Math.max(0, Math.round(Number(state.manualHitCountBonus) || 0) + delta);
              refreshPvpDamageOutputs(root);
              return;
            }
            state.manualStatMods = normalizeStatMods(state.manualStatMods);
            const nextValue = (Number(state.manualStatMods[statKey]) || 0) + delta * PVP_MANUAL_BUFF_STEP;
            state.manualStatMods[statKey] = Math.round(nextValue * 10) / 10;
            refreshPvpDamageOutputs(root);
          });
        });
        root.querySelectorAll(`[data-pvp-trait-layer="${side}"]`).forEach((button) => {
          button.addEventListener("click", () => {
            const delta = Number(button.dataset.delta) || 0;
            state.traitLayers = Math.max(
              0,
              window.LKWG_PVP_TRAIT_RULES.normalizeTraitLayers(state.traitLayers) + delta
            );
            refreshPvpManualBuffPanel(root, side);
            refreshPvpDamageOutputs(root);
          });
        });
        updatePvpActionClasses(root, side);
      });
    }

    function renderResults() {
      const team = readTeam();
      saveTeam();
      updateRollerButton(team);

      const petHtml = team.map((pet, petIndex) => {
        const monster = monsterById.get(pet.monsterId);
        const bloodline = bloodlineById.get(pet.bloodlineId);
        const passives = getMonsterPassives(monster);
        const petTypes = unique(monster?.types || []);
        const passiveNames = passives.length ? passives.map((passive) => passive.name).join("、") : "无特性";
        const innateStrong = strongTargetsForAttackTypes(petTypes);
        const innateResisted = resistedTargetsForAttackTypes(petTypes);
        const weakBy = weakAttackersAgainst(petTypes);
        const resistFrom = resistingAttackersAgainst(petTypes);
        const skillRows = pet.skills.map((skillRef, skillIndex) => {
          const skill = skillById.get(skillRef.skillId);
          if (!skill) {
            return `
              <div class="skill-chip">
                <span class="combo-icon placeholder">?</span>
                <div><strong>技能${skillIndex + 1} 未选择</strong><div class="line">未计入克制面</div></div>
              </div>

          if (!isAttackSkill(skill)) {
            return `
              <div class="skill-chip">
                ${iconHtml(skill, "combo-icon")}
                <div>
                  <strong>技能${skillIndex + 1} ${escapeHtml(skill.name)}</strong>
                  <div class="line">${CATEGORY_NAMES[skill.category] || skill.category} / ${typeName(skill.type)}，不计入克制</div>
                </div>
              </div>
            `;
          }
          const strong = RELATION[skill.type]?.strong || [];
          return `
            <div class="skill-chip">
              ${iconHtml(skill, "combo-icon")}
              <div>
                <strong>技能${skillIndex + 1} ${escapeHtml(skill.name)}</strong>
                <div class="line">${CATEGORY_NAMES[skill.category] || skill.category} / ${typeName(skill.type)}；克制 ${strong.length ? strong.map(typeName).join("、") : "无"}</div>
              </div>
            </div>
