    }

    function renderPvpDamageSimulation(team) {
      return `
        <article class="analysis-card pvp-damage-sim" id="pvpDamageSim">
          <h3>PVP对战伤害模拟</h3>
          <div class="pvp-sim-grid">
            ${renderPvpSide("ally", "己方精灵")}
            ${renderPvpSide("enemy", "敌方精灵")}
          </div>
        </article>
      `;
    }

    function updatePvpActionClasses(root, side) {
      const state = pvpSideState(side);
      const monster = monsterById.get(state.monsterId);
      const locked = forceImpactLocked(state);
      state.skillIds.forEach((skillId, skillIndex) => {
        const host = root.querySelector(`[data-pvp-combo="${side}-skill-${skillIndex}"]`);
        if (!host) return;
        host.classList.toggle("pvp-action-combo", Boolean(skillId));
        host.classList.toggle("active", state.action === `skill:${skillIndex}`);
        const slot = root.querySelector(`[data-pvp-skill-slot="${side}-${skillIndex}"]`);
        if (slot) {
          slot.classList.toggle("active", state.action === `skill:${skillIndex}`);
        }
      });
      const forceButton = root.querySelector(`[data-pvp-force="${side}"]`);
      if (forceButton) {
        forceButton.disabled = locked;
        forceButton.classList.toggle("active", state.action === "force" && !locked);
        forceButton.setAttribute("aria-pressed", state.action === "force" && !locked ? "true" : "false");
        const iconWrap = forceButton.querySelector(".pvp-force-icon-wrap");
        if (iconWrap) {
          iconWrap.innerHTML = forceImpactButtonIcon(state, monster);
        }
      }
    }

    function refreshPvpDamageOutputs(root) {
      ["ally", "enemy"].forEach((side) => {
        const state = pvpSideState(side);
        const monster = monsterById.get(state.monsterId);
        const statsEl = root.querySelector(`[data-pvp-panel-stats="${side}"]`);
        if (statsEl) statsEl.outerHTML = renderPvpPanelStats(monster, state, side);
        const damageEl = root.querySelector(`[data-pvp-damage-result="${side}"]`);
        if (damageEl) damageEl.outerHTML = renderPvpDamageResult(side);
        refreshPvpManualBuffPanel(root, side);
        updatePvpActionClasses(root, side);
      });
    }

    function setPvpAction(state, action) {
      state.action = state.action === action ? "" : action;
      state.actionMonsterId = state.action ? (state.monsterId || "") : "";
      state.actionCuteLayers = state.action ? normalizePvpCuteLayers(state.cuteLayers) : 0;
      state.forceImpact = state.action === "force";
    }

    function hasPvpSpecialPowerRule(skill) {
      return Boolean(window.LKWG_PVP_DAMAGE_RULES?.resolveSpecialPvpPowerRule?.(skill, {}));
    }

    function selectPvpSkillAction(state, skillIndex, skill) {
      const action = `skill:${skillIndex}`;
      if (skill?.category === "defense" || hasPvpSpecialPowerRule(skill)) {
        state.action = action;
        state.actionMonsterId = state.monsterId || "";
        state.actionCuteLayers = normalizePvpCuteLayers(state.cuteLayers);
        state.forceImpact = false;
        return;
      }
      setPvpAction(state, action);
    }

    function pvpPostUseEffects(state, skill) {
      const monster = monsterById.get(pvpActionSnapshotMatchesCurrentMonster(state) ? state?.actionMonsterId : state?.monsterId);
      const context = {
        canGainCuteLayer: canGainPvpCuteLayer(monster),
        cuteTotal: state?.cuteLayers ?? 0
      };
      if (window.LKWG_PVP_DAMAGE_RULES?.resolvePvpPostUseEffects) {
        return window.LKWG_PVP_DAMAGE_RULES.resolvePvpPostUseEffects(skill, context) || {};
      }
      return window.LKWG_PVP_DAMAGE_RULES?.resolveSpecialPvpPowerRule?.(skill, context)?.postUseEffects || {};
    }

    function applyPvpPostUseSkillEffects(state, skill) {
      const effects = pvpPostUseEffects(state, skill);
      const cuteLayerDelta = Math.round(Number(effects.cuteLayerDelta) || 0);
      let changed = false;
      let cuteLayerChanged = false;
      if (cuteLayerDelta) {
        cuteLayerChanged = applyPvpCuteLayerDelta(state, cuteLayerDelta);
        changed = cuteLayerChanged;
      }
      if (effects.requiresSuccessfulCuteLayer && !cuteLayerChanged) return changed;
      const statFlatMods = normalizeStatMods(effects.statFlatMods);
      if (Object.values(statFlatMods).some((value) => Math.abs(Number(value) || 0) > 0.0001)) {
        state.skillFlatStatMods = mergeStatMods(state.skillFlatStatMods, statFlatMods);
        changed = true;
      }
      if (changed && effects.labels?.length) {
        const text = `${skill.name}：${effects.labels.join(" / ")}`;
        state.supportText = state.supportText ? `${state.supportText} / ${text}` : text;
      }
      return changed;
    }

    function applyPvpSupportSkill(state, skill) {
      if (!skill || isAttackSkill(skill)) return false;
      const effects = supportSkillEffects(skill);
      const labels = effects.labels;
      if (!labels.length) return false;
      state.skillStatMods = mergeStatMods(state.skillStatMods, effects.statMods);
      state.manualDamageBonus = (Number(state.manualDamageBonus) || 0) + (Number(effects.manualDamageBonus) || 0);
      state.manualPowerPercentBonus = (Number(state.manualPowerPercentBonus) || 0) + (Number(effects.manualPowerPercentBonus) || 0);
      state.manualHitCountBonus = Math.max(0, Math.round(Number(state.manualHitCountBonus) || 0) + Math.max(0, Math.round(Number(effects.manualHitCountBonus) || 0)));
      state.supportText = `${skill.name}：${labels.join(" / ")}`;
      if (skill.category === "defense") return false;
      state.action = "";
      state.actionMonsterId = "";
      state.actionCuteLayers = 0;
      state.forceImpact = false;
      return true;
    }

    function hydratePvpDamageSimulation(team) {
      const root = document.getElementById("pvpDamageSim");
      if (!root) return;

      ["ally", "enemy"].forEach((side) => {
        const state = pvpSideState(side);
        const isAlly = side === "ally";
        const selectedMonster = monsterById.get(state.monsterId);
        const monsterItems = isAlly ? prioritizedAllyMonsters(team) : dexData.monsters;
        const selectedTeam = selectedTeamMonsters(team);

        createCombo(root.querySelector(`[data-pvp-combo="${side}-monster"]`), {
          items: monsterItems,
          value: state.monsterId,
          selectedItem: selectedMonster || null,
          placeholder: isAlly && selectedTeam.length ? "优先选择阵容精灵，也可搜索精灵池" : "搜索精灵名称",
          emptyText: "未选择精灵",
          itemsForQuery: isAlly ? (query) => allyMonsterItemsForQuery(team, query) : enemyMonsterItemsForQuery,
          skipDefaultFilter: true,
          onSelect: (item) => {
            if (!item) {
              clearPvpSideState(state);
              renderResults();
              return;
            }
            const monsterChanged = state.monsterId !== item.id;
            state.monsterId = item.id;
            if (monsterChanged) resetPvpTraitLayers(state, item);
            state.action = "";
            state.actionMonsterId = "";
            state.actionCuteLayers = 0;
            state.forceImpact = false;
            state.cuteLayers = 0;
            resetPvpManualBuffs(state);
            state.energy = DEFAULT_PVP_ENERGY;
            if (isAlly) {
              const teamPet = teamPetForMonster(team, item.id);
              if (teamPet) {
                applyTeamPetToPvpSide(state, teamPet, item);
              } else {
                state.bloodlineId = "";
                state.natureId = "";
                state.talentIds = ["", "", ""];
                state.skillIds = ["", "", "", ""];
                state.actionMonsterId = "";
                state.actionCuteLayers = 0;
                state.cuteLayers = 0;
                resetPvpManualBuffs(state);
                state.energy = DEFAULT_PVP_ENERGY;
              }
            }
            renderResults();
          }
        });

        createCombo(root.querySelector(`[data-pvp-combo="${side}-bloodline"]`), {
          items: BLOODLINES,
          value: state.bloodlineId,
          placeholder: "搜索血脉名称",
          selectedPlaceholder: "",
          displayName: bloodlineShortLabel,
          showMeta: false,
          emptyText: "未选择血脉",
          onSelect: (item) => {
            state.bloodlineId = item?.id || "";
            if (item?.id === "bloodline-boss") {
              state.action = "";
              state.forceImpact = false;
            }
            refreshPvpDamageOutputs(root);
          }
        });

        createCombo(root.querySelector(`[data-pvp-combo="${side}-nature"]`), {
          items: PVP_NATURES,
          value: state.natureId,
          placeholder: "选择性格",
          emptyText: `默认${DEFAULT_DAMAGE_NATURE_TEXT}`,
          clearPlaceholderOnFocus: true,
          onSelect: (item) => {
            state.natureId = item?.id || "";
            refreshPvpDamageOutputs(root);
          }
        });

        state.talentIds.forEach((talentId, talentIndex) => {
          const talentItems = () => {
            const selectedIds = new Set(state.talentIds.filter(Boolean));
            return PVP_TALENTS.filter((talent) => talent.id === state.talentIds[talentIndex] || !selectedIds.has(talent.id));
          };
          createCombo(root.querySelector(`[data-pvp-combo="${side}-talent-${talentIndex}"]`), {
            items: talentItems(),
            value: talentId,
            placeholder: "选择天分",
            emptyText: defaultDamageTalentEmptyText(talentIndex),
            clearPlaceholderOnFocus: true,
            itemsForQuery: talentItems,
            onSelect: (item) => {
              state.talentIds[talentIndex] = item?.id || "";
              renderResults();
            }
          });
        });

        state.skillIds.forEach((skillId, skillIndex) => {
          const selectedSkill = skillById.get(skillId);
          createCombo(root.querySelector(`[data-pvp-combo="${side}-skill-${skillIndex}"]`), {
            items: dexData.skills,
            value: skillId,
            selectedItem: selectedSkill || null,
            placeholder: `选择技能${skillIndex + 1}`,
            emptyText: "未选择技能",
            clearPlaceholderOnFocus: true,
            itemsForQuery: fuzzySkillItems,
            skipDefaultFilter: true,
            readonlyWhenSelected: true,
            prefixHtml: `<span class="pvp-skill-index">${skillIndex + 1}</span>`,
            onSelect: (item) => {
              state.skillIds[skillIndex] = item?.id || "";
              let postUseChanged = false;
              if (item) {
                if (isAttackSkill(item)) {
                  selectPvpSkillAction(state, skillIndex, item);
                } else if (applyPvpSupportSkill(state, item)) {
                  // Support skill release is recorded as a stack each time.
                } else {
                  selectPvpSkillAction(state, skillIndex, item);
                }
                postUseChanged = applyPvpPostUseSkillEffects(state, item);
              } else if (state.action === `skill:${skillIndex}`) {
                state.action = "";
                state.actionMonsterId = "";
                state.forceImpact = false;
              }
              if (postUseChanged) {
                renderResults();
              } else {
                refreshPvpDamageOutputs(root);
              }
            }
          });
          const skillHost = root.querySelector(`[data-pvp-combo="${side}-skill-${skillIndex}"]`);
          skillHost?.addEventListener("click", (event) => {
            if (event.target.closest(".combo-clear") || event.target.closest(".combo-menu") || !state.skillIds[skillIndex]) return;
            const skill = skillById.get(state.skillIds[skillIndex]);
            const supportChanged = applyPvpSupportSkill(state, skill);
            if (!supportChanged) {
              selectPvpSkillAction(state, skillIndex, skill);
            }
            const postUseChanged = applyPvpPostUseSkillEffects(state, skill);
            if (supportChanged || postUseChanged) {
              if (postUseChanged) {
                renderResults();
                return;
              }
              refreshPvpDamageOutputs(root);
              return;
            }
            refreshPvpDamageOutputs(root);
          });
        });

        const forceButton = root.querySelector(`[data-pvp-force="${side}"]`);
        forceButton?.addEventListener("click", () => {
          if (forceImpactLocked(state)) return;
          setPvpAction(state, "force");
          refreshPvpDamageOutputs(root);
        });

        root.querySelectorAll(`[data-pvp-buff="${side}"]`).forEach((button) => {
          button.addEventListener("click", () => {
            const statKey = button.dataset.stat;
            const statConfig = PVP_MANUAL_BUFF_STATS.find((stat) => stat.key === statKey);
            if (!statConfig) return;
            const delta = Number(button.dataset.delta) || 0;
            if (statConfig.flat) {
              state.manualDamageBonus = (Number(state.manualDamageBonus) || 0) + delta * PVP_MANUAL_DAMAGE_STEP;
              refreshPvpDamageOutputs(root);
              return;
            }
            if (statConfig.powerPercent) {
              const nextValue = (Number(state.manualPowerPercentBonus) || 0) + delta * PVP_MANUAL_BUFF_STEP;
              state.manualPowerPercentBonus = Math.round(nextValue * 10) / 10;
              refreshPvpDamageOutputs(root);
              return;
            }
            if (statConfig.hitCount) {
              state.manualHitCountBonus = Math.max(0, Math.round(Number(state.manualHitCountBonus) || 0) + delta);
              refreshPvpDamageOutputs(root);
              return;
            }
            state.manualStatMods = normalizeStatMods(state.manualStatMods);
            const nextValue = (Number(state.manualStatMods[statKey]) || 0) + delta * PVP_MANUAL_BUFF_STEP;
            state.manualStatMods[statKey] = Math.round(nextValue * 10) / 10;
            refreshPvpDamageOutputs(root);
          });
        });
        root.querySelectorAll(`[data-pvp-trait-layer="${side}"]`).forEach((button) => {
          button.addEventListener("click", () => {
            const delta = Number(button.dataset.delta) || 0;
            state.traitLayers = Math.max(
              0,
              window.LKWG_PVP_TRAIT_RULES.normalizeTraitLayers(state.traitLayers) + delta
            );
            refreshPvpManualBuffPanel(root, side);
            refreshPvpDamageOutputs(root);
          });
        });
        root.querySelectorAll(`[data-pvp-cute-layer="${side}"]`).forEach((button) => {
          button.addEventListener("click", () => {
            const delta = Number(button.dataset.delta) || 0;
            if (applyPvpCuteLayerDelta(state, delta)) {
              renderResults();
            } else {
              state.cuteLayers = normalizePvpCuteLayers(state.cuteLayers);
              refreshPvpManualBuffPanel(root, side);
              refreshPvpDamageOutputs(root);
            }
          });
        });
        updatePvpActionClasses(root, side);
      });
    }

    function renderResults() {
      const team = readTeam();
      saveTeam();
      updateRollerButton(team);

      resultsEl.innerHTML = renderRollerSuperModule(team)
        + renderAnalysis(team)
        + renderPvpDamageSimulation(team);
      hydrateRollerSkillPickers(team);
      hydratePvpDamageSimulation(team);
    }

    function updateRollerUndoButton() {
      undoRollerBtn.disabled = rollerHistory.length === 0;
    }

    function rotateSkillsDown() {
      const team = readTeam();
      rollerHistory.push(JSON.parse(JSON.stringify(team)));
      updateRollerUndoButton();
      const slots = team.flatMap((pet, petIndex) => pet.skills.map((skill, skillIndex) => ({
        petIndex,
        skillIndex,
        skill: { ...skill }
      })));
      const lastSkill = slots[slots.length - 1].skill;
      for (let index = slots.length - 1; index > 0; index -= 1) {
        const target = slots[index];
        team[target.petIndex].skills[target.skillIndex] = slots[index - 1].skill;
      }
      team[0].skills[0] = lastSkill;
      renderTeam(team);
      saveSpecificTeam(team);
      renderResults();
    }

    function undoRoller() {
      const previousTeam = rollerHistory.pop();
      updateRollerUndoButton();
      if (!previousTeam) return;
      renderTeam(previousTeam);
      saveSpecificTeam(previousTeam);
      renderResults();
    }

    function renderMatrix() {
      const header = `<tr><th>攻击 \\ 防守</th>${TYPES.map((type) => `<th><span class="tag">${typeBadgeHtml(type.key)}${type.name}</span></th>`).join("")}</tr>`;
      const rows = TYPES.map((attacker) => {
        const cells = TYPES.map((defender) => {
          const multiplier = relationMultiplier(attacker.key, defender.key);
          const className = multiplier > 1 ? "mult-strong" : multiplier < 1 ? "mult-weak" : "";
          const text = multiplier > 1 ? "2x" : multiplier < 1 ? "0.5x" : "1x";
          return `<td class="${className}">${text}</td>`;
        }).join("");
        return `<tr><th><span class="tag">${typeBadgeHtml(attacker.key)}${attacker.name}</span></th>${cells}</tr>`;
      }).join("");
      matrixWrap.innerHTML = `<table aria-label="属性关系表"><thead>${header}</thead><tbody>${rows}</tbody></table>`;
    }

    function bossFormDisplayName(name) {
      const baseName = String(name || "").trim();
      return /首领|Boss|BOSS/.test(baseName) ? baseName : `${baseName}（首领）`;
    }

    function bossFormSourceMonster(monsters, bossName) {
      const key = compactMonsterName(bossName);
      const byName = new Map();
      (monsters || []).filter((monster) => !isGeneratedBossForm(monster) && !isBossVariant(monster)).forEach((monster) => {
        pvpMonsterNameKeys(monster).forEach((nameKey) => {
          if (!byName.has(nameKey)) byName.set(nameKey, monster);
        });
      });
      if (byName.has(key)) return byName.get(key);

      const traitRules = window.LKWG_PVP_TRAIT_RULES;
      const rule = Array.isArray(traitRules?.RULES)
        ? traitRules.RULES.find((item) => (item.names || []).some((name) => compactMonsterName(name) === key))
        : null;
      const sourceNames = (rule?.names || [])
        .filter((name) => compactMonsterName(name) !== key)
        .slice()
        .reverse();
      for (const sourceName of sourceNames) {
        const source = byName.get(compactMonsterName(sourceName));
        if (source) return source;
      }
      return null;
    }

    function bossFormNamesFromMonsters(monsters) {
      const names = new Set(REAL_BOSS_FORM_NAMES);
      (monsters || []).forEach((monster) => {
        const raw = monster?.raw || {};
        const rawNames = [
          ...(Array.isArray(raw.bossFormNames) ? raw.bossFormNames : []),
          ...(Array.isArray(raw.boss_form_names) ? raw.boss_form_names : [])
        ];
        rawNames.forEach((name) => {
          if (name) names.add(name);
        });
        if (!isBossVariant(monster) && (raw.bossFormAvailable || raw.boss_form_available)) {
          const sourceName = raw.bossFormName || raw.boss_form_name || monster.name;
          if (sourceName) names.add(sourceName);
        }
      });
      return [...names].filter(Boolean);
    }

    function createGeneratedBossForm(source, bossName, usedIds = new Set()) {
      if (!source || !bossName) return null;
      const displayName = bossFormDisplayName(bossName);
      let id = `${source.id || compactMonsterName(bossName)}${BOSS_FORM_SUFFIX}`;
      if (usedIds.has(id)) id = `${id}_${compactMonsterName(bossName)}`;
      return {
        ...source,
        id,
        name: displayName,
        aliases: unique([bossName, source.name, ...(source.aliases || []), ...(source.raw?.name_aliases || [])]),
        skillIds: [...(source.skillIds || [])],
        raw: {
          ...(source.raw || {}),
          isGeneratedBossForm: true,
          baseMonsterId: source.id,
          bossFormName: bossName,
          displayName,
          chainId: `${source.raw?.chainId || source.raw?.evolutionChainId || source.id || compactMonsterName(bossName)}-boss`,
          evolutionChainId: `${source.raw?.chainId || source.raw?.evolutionChainId || source.id || compactMonsterName(bossName)}-boss`,
          evolutionStage: source.raw?.evolutionStage || source.raw?.evolution_stage || source.raw?.stage || 1
        }
      };
    }

    function withBossForms(monsters) {
      const baseMonsters = (monsters || []).filter((monster) => !isGeneratedBossForm(monster));
      const usedIds = new Set(baseMonsters.map((monster) => monster.id));
      const existingNames = new Set(baseMonsters.map((monster) => compactMonsterName(monster.name)));
      const directBossNames = new Set();
      baseMonsters.filter(isBossVariant).forEach((monster) => {
        pvpMonsterNameKeys(monster).forEach((nameKey) => directBossNames.add(nameKey));
      });
      const bossForms = bossFormNamesFromMonsters(baseMonsters).map((bossName) => {
        const displayName = bossFormDisplayName(bossName);
        if (directBossNames.has(compactMonsterName(bossName))) return null;
        if (existingNames.has(compactMonsterName(displayName))) return null;
        const source = bossFormSourceMonster(baseMonsters, bossName);
        const bossForm = createGeneratedBossForm(source, bossName, usedIds);
        if (bossForm) {
          usedIds.add(bossForm.id);
          existingNames.add(compactMonsterName(displayName));
        }
        return bossForm;
      }).filter(Boolean);
      return [...baseMonsters, ...bossForms]
        .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
    }

    function cleanLocalText(value) { return String(value ?? "").trim(); }
    function cleanLocalArray(value) { return Array.isArray(value) ? [...new Set(value.map(cleanLocalText).filter(Boolean))] : []; }
    function cleanLocalNumber(value) { if (value === "" || value === null || value === undefined) return ""; const number = Number(value); return Number.isFinite(number) ? number : ""; }
    function cleanLocalStats(value) { const source = value && typeof value === "object" ? value : {}; return Object.fromEntries(["hp", "atk", "defense", "spa", "spd", "spe"].map((key) => [key, cleanLocalNumber(source[key])])); }
    function normalizeLocalBundle(bundle) {
      const source = bundle && typeof bundle === "object" ? bundle : {};
      const monsters = (source.monsters || []).map((monster) => { const raw = monster?.raw && typeof monster.raw === "object" ? monster.raw : {}; return { kind: "monster", id: cleanLocalText(monster?.id), name: cleanLocalText(monster?.name), aliases: cleanLocalArray(monster?.aliases), icon: "", types: cleanLocalArray(monster?.types), skillIds: cleanLocalArray(monster?.skillIds), passiveIds: cleanLocalArray(monster?.passiveIds), raw: { stats: cleanLocalStats(raw.stats || monster?.stats), chainId: cleanLocalText(raw.chainId || monster?.chainId), evolutionChainId: cleanLocalText(raw.evolutionChainId || monster?.evolutionChainId), evolutionStage: cleanLocalNumber(raw.evolutionStage || monster?.evolutionStage), bossFormAvailable: Boolean(raw.bossFormAvailable || monster?.bossFormAvailable), isGeneratedBossForm: Boolean(raw.isGeneratedBossForm || monster?.isGeneratedBossForm), baseMonsterId: cleanLocalText(raw.baseMonsterId || monster?.baseMonsterId) } }; }).filter((monster) => monster.id && monster.name).sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
      const skills = (source.skills || []).map((skill) => ({ kind: "skill", id: cleanLocalText(skill?.id), name: cleanLocalText(skill?.name), aliases: cleanLocalArray(skill?.aliases), icon: "", type: cleanLocalText(skill?.type), category: cleanLocalText(skill?.category || skill?.mode), mode: cleanLocalText(skill?.mode), power: cleanLocalNumber(skill?.power), accuracy: cleanLocalNumber(skill?.accuracy), pp: cleanLocalNumber(skill?.pp), energyCost: cleanLocalNumber(skill?.energyCost), priority: cleanLocalNumber(skill?.priority), description: cleanLocalText(skill?.description), raw: { ...skill, icon: "" } })).filter((skill) => skill.id && skill.name && skill.type).sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
      const passives = (source.passives || []).map((passive) => ({ kind: "passive", id: cleanLocalText(passive?.id), name: cleanLocalText(passive?.name), aliases: cleanLocalArray(passive?.aliases), icon: "", description: cleanLocalText(passive?.description), raw: { ...passive, icon: "" } })).filter((passive) => passive.id && passive.name).sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
      return { generatedAt: source.generatedAt || "local-bundle", currentSeason: source.currentSeason || "本地数据包", seasons: [], monsters, passives, bloodlines: BLOODLINES, skills };
    }

    function isAdminMode() {
      const hash = String(window.location.hash || "").toLowerCase();
      return hash === "#admin" || hash === "#data-admin";
    }

    function rejectMutableDataFields(bundle) {
      const fields = [];
      if (Object.prototype.hasOwnProperty.call(bundle || {}, "bloodlines")) fields.push("bloodlines");
      if (Object.prototype.hasOwnProperty.call(bundle || {}, "pvpPresets")) fields.push("pvpPresets");
      if (fields.length) {
        throw new Error("数据包不能包含 " + fields.join("、") + " 字段；血脉和 PVP 默认配置由 HTML 固定维护。");
      }
    }

    function rejectForbiddenBundleContent(bundle) {
      const sourceMarkers = [["wi", "ki"].join(""), ["bili", "game"].join("")];
      const imageExtensions = [["pn", "g"].join(""), ["jp", "g"].join(""), ["jp", "eg"].join(""), ["sv", "g"].join(""), ["web", "p"].join("")];
      const visit = (value, path = "数据包") => {
        if (typeof value === "string") {
          const lower = value.toLowerCase();
          if (sourceMarkers.some((marker) => lower.includes(marker))) {
            throw new Error(path + " 包含禁止的来源标记。");
          }
          if (/https?:\/\//i.test(value)) {
            throw new Error(path + " 包含外部链接。");
          }
          const cleanPath = lower.split(/[?#]/)[0];
          if (imageExtensions.some((extension) => cleanPath.endsWith("." + extension))) {
            throw new Error(path + " 包含图片文件路径。");
          }
          return;
        }
        if (Array.isArray(value)) {
          value.forEach((item, index) => visit(item, `${path}[${index}]`));
          return;
        }
        if (!value || typeof value !== "object") return;
        Object.entries(value).forEach(([key, item]) => {
          const normalizedKey = key.toLowerCase().replace(/[_-]/g, "");
          if (
            normalizedKey === "bloodlines"
            || normalizedKey === "pvppresets"
            || normalizedKey.startsWith("source")
            || normalizedKey.includes("image")
            || normalizedKey.includes("icon")
          ) {
            throw new Error(`${path}.${key} 是禁止字段。`);
          }
          visit(item, `${path}.${key}`);
        });
      };
      visit(bundle);
    }

    function validateLocalBundleShape(bundle) {
      if (!bundle || typeof bundle !== "object") throw new Error("数据包不是有效 JSON 对象。");
      const allowedKeys = new Set(["schemaVersion", "generatedAt", "currentSeason", "monsters", "skills", "passives"]);
      const unknownKeys = Object.keys(bundle).filter((key) => !allowedKeys.has(key));
      if (unknownKeys.length) throw new Error("数据包包含无效字段：" + unknownKeys.join("、") + "。");
      if (bundle.schemaVersion !== 1) throw new Error("数据包 schemaVersion 必须为 1。");
      if (!Array.isArray(bundle.monsters) || bundle.monsters.length === 0) throw new Error("数据包缺少 monsters 精灵数组。");
      if (!Array.isArray(bundle.skills) || bundle.skills.length === 0) throw new Error("数据包缺少 skills 技能数组。");
      if (!Array.isArray(bundle.passives)) throw new Error("数据包缺少 passives 特性数组。");
      const statKeys = ["hp", "atk", "defense", "spa", "spd", "spe"];
      const monsterIds = new Set();
      const skillIds = new Set();
      const passiveIds = new Set();
      bundle.skills.forEach((skill, index) => {
        const label = `skills[${index}]`;
        if (!skill || typeof skill !== "object") throw new Error(label + " 不是有效技能对象。");
        if (!/^skill-[^\s]+$/.test(String(skill.id || ""))) throw new Error(label + ".id 必须使用 skill- 前缀。");
        if (skillIds.has(skill.id)) throw new Error(label + ".id 重复：" + skill.id + "。");
        skillIds.add(skill.id);
        if (!String(skill.name || "").trim()) throw new Error(label + ".name 不能为空。");
        if (!TYPE_MAP[String(skill.type || "")]) throw new Error(label + ".type 不是合法属性。");
        if (!String(skill.category || skill.mode || "").trim()) throw new Error(label + " 必须包含 skill.category 或 skill.mode。");
        if (!Object.prototype.hasOwnProperty.call(skill, "power") || (skill.power !== null && !Number.isFinite(Number(skill.power)))) {
          throw new Error(label + ".power 必须为数字或 null。");
        }
        if (
          !Object.prototype.hasOwnProperty.call(skill, "pp")
          && !Object.prototype.hasOwnProperty.call(skill, "energyCost")
        ) {
          throw new Error(label + " 必须包含 skill.pp 或 skill.energyCost。");
        }
        ["pp", "energyCost"].forEach((key) => {
          if (Object.prototype.hasOwnProperty.call(skill, key) && skill[key] !== null && !Number.isFinite(Number(skill[key]))) {
            throw new Error(`${label}.${key} 必须为数字或 null。`);
          }
        });
        if (typeof skill.description !== "string") throw new Error(label + ".description 必须为文字。");
      });
      bundle.passives.forEach((passive, index) => {
        const label = `passives[${index}]`;
        if (!passive || typeof passive !== "object") throw new Error(label + " 不是有效特性对象。");
        if (!/^passive-[^\s]+$/.test(String(passive.id || ""))) throw new Error(label + ".id 必须使用 passive- 前缀。");
        if (passiveIds.has(passive.id)) throw new Error(label + ".id 重复：" + passive.id + "。");
        passiveIds.add(passive.id);
        if (!String(passive.name || "").trim()) throw new Error(label + ".name 不能为空。");
        if (typeof passive.description !== "string") throw new Error(label + ".description 必须为文字。");
      });
      bundle.monsters.forEach((monster, index) => {
        const label = `monsters[${index}]`;
        if (!monster || typeof monster !== "object") throw new Error(label + " 不是有效精灵对象。");
        if (!/^monster-[^\s]+$/.test(String(monster.id || ""))) throw new Error(label + ".id 必须使用 monster- 前缀。");
        if (monsterIds.has(monster.id)) throw new Error(label + ".id 重复：" + monster.id + "。");
        monsterIds.add(monster.id);
        if (!String(monster.name || "").trim()) throw new Error(label + ".name 不能为空。");
        if (!Array.isArray(monster.types) || monster.types.length === 0 || monster.types.some((type) => !TYPE_MAP[type])) {
          throw new Error(label + ".types 必须是合法属性数组。");
        }
        if (!Array.isArray(monster.skillIds)) throw new Error(label + ".skillIds 必须是数组。");
        if (!Array.isArray(monster.passiveIds)) throw new Error(label + ".passiveIds 必须是数组。");
        if (!monster.stats || typeof monster.stats !== "object") throw new Error(label + ".monster.stats 缺失。");
        statKeys.forEach((key) => {
          const value = monster.stats[key];
          if (value === null || value === undefined || value === "" || !Number.isFinite(Number(value))) {
            throw new Error(`${label}.monster.stats.${key} 必须为数字。`);
          }
        });
      });
      bundle.monsters.forEach((monster) => {
        monster.skillIds.forEach((skillId) => {
          if (!skillIds.has(skillId)) throw new Error(`精灵 ${monster.name} 的 monster.skillIds 引用了不存在的技能：${skillId}。`);
        });
        monster.passiveIds.forEach((passiveId) => {
          if (!passiveIds.has(passiveId)) throw new Error(`精灵 ${monster.name} 的 monster.passiveIds 引用了不存在的特性：${passiveId}。`);
        });
      });
    }

    function releaseBundleCopy(bundle) {
      return JSON.parse(JSON.stringify({
        schemaVersion: bundle.schemaVersion,
        generatedAt: cleanLocalText(bundle.generatedAt),
        currentSeason: cleanLocalText(bundle.currentSeason) || "本地数据包",
        monsters: bundle.monsters,
        skills: bundle.skills,
        passives: bundle.passives
      }));
    }

    function applyLoadedBundle(bundle) {
      rejectMutableDataFields(bundle);
      rejectForbiddenBundleContent(bundle);
      validateLocalBundleShape(bundle);
      activeLocalBundle = releaseBundleCopy(bundle);
      applyDexData(normalizeLocalBundle(activeLocalBundle));
      return activeLocalBundle;
    }

    async function fetchLocalBundle() {
      const response = await fetch(LOCAL_BUNDLE_URL, { cache: "no-cache" });
      if (!response.ok) throw new Error("本地数据包读取失败：HTTP " + response.status);
      return response.json();
    }

    function applyDexData(data) {
      dexSourceData = normalizeLocalBundle(data);
      const nextData = { ...dexSourceData, monsters: withBossForms(dexSourceData.monsters || []), skills: dexSourceData.skills || [], bloodlines: BLOODLINES };
      nextData.monsters.forEach((monster) => { monster.icon = repairCachedImageUrl(monster.icon); });
      nextData.skills.forEach((skill) => { skill.icon = repairCachedImageUrl(skill.icon); skill.category = repairCachedSkillCategory(skill); skill.power = repairCachedSkillPower(skill); });
      dexData = nextData;
      monsterById = new Map(dexData.monsters.map((monster) => [monster.id, monster]));
      skillById = new Map(dexData.skills.map((skill) => [skill.id, skill]));
      passiveById = new Map((dexData.passives || []).map((passive) => [passive.id, passive]));
      bloodlineById = new Map(BLOODLINES.map((bloodline) => [bloodline.id, bloodline]));
      updateRollerButtonIcon();
      const bossCount = dexData.monsters.filter(isBossVariant).length;
      dataStatus.textContent = "当前数据：" + (dexData.currentSeason || "本地数据包") + "，" + dexData.monsters.length + " 只精灵（含 " + bossCount + " 个首领形态），" + dexData.skills.length + " 个技能，" + bloodlineById.size + " 个血脉，" + (dexData.passives || []).length + " 个特性。";
    }

    async function loadDexData() {
      if (isAdminMode()) {
        try {
          const stored = localStorage.getItem(ADMIN_DATA_STORAGE_KEY);
          if (stored) {
            const bundle = JSON.parse(stored);
            applyLoadedBundle(bundle);
            dataStatus.textContent = "admin 测试模式：已使用浏览器本地导入数据。";
            return;
          }
        } catch (error) {
          console.warn(error);
          localStorage.removeItem(ADMIN_DATA_STORAGE_KEY);
          dataStatus.textContent = "admin 本地测试数据无效，已改读 data/local-bundle.json：" + error.message;
        }
      }
      try {
        const bundle = await fetchLocalBundle();
        applyLoadedBundle(bundle);
        return;
      } catch (error) {
        console.warn(error);
        activeLocalBundle = null;
        applyDexData(FALLBACK_DATA);
        dataStatus.textContent = "本地数据包读取失败，已使用内置示例数据：" + error.message;
      }
    }

    function sanitizeTeamForDex(team) {
      return normalizeTeam(team).map((pet) => {
        const monster = monsterById.get(pet.monsterId);
        if (!monster) return { ...pet, natureId: "", talentIds: ["", "", ""], rollerSkillId: "", skills: pet.skills.map(() => ({ skillId: "" })) };
        return {
          ...pet,
          bloodlineId: bloodlineById.has(pet.bloodlineId) ? pet.bloodlineId : "",
          natureId: PVP_NATURES.some((nature) => nature.id === pet.natureId) ? pet.natureId : "",
          talentIds: Array.from({ length: 3 }, (_, index) => (
            PVP_TALENTS.some((talent) => talent.id === pet.talentIds?.[index]) ? pet.talentIds[index] : ""
          )),
          rollerSkillId: skillById.has(pet.rollerSkillId) ? pet.rollerSkillId : "",
          skills: pet.skills.map((skill) => ({ skillId: skillById.has(skill.skillId) ? skill.skillId : "" }))
        };
      });
    }

    function refreshCurrentViewAfterDataChange() {
      renderTeam(sanitizeTeamForDex(loadTeam()));
      renderMatrix();
      renderResults();
    }

    async function importAdminBundleFile(file) {
      if (!file) return null;
      let bundle;
      try {
        bundle = JSON.parse(await file.text());
      } catch (error) {
        throw new Error("JSON 文件解析失败：" + error.message);
      }
      const importedBundle = applyLoadedBundle(bundle);
      localStorage.setItem(ADMIN_DATA_STORAGE_KEY, JSON.stringify(importedBundle));
      refreshCurrentViewAfterDataChange();
      dataStatus.textContent = `已导入数据包：${importedBundle.monsters.length} 只精灵，${importedBundle.skills.length} 个技能，${importedBundle.passives.length} 个特性。`;
      return importedBundle;
    }

    function exportAdminBundle() {
      if (!isAdminMode() || !activeLocalBundle) {
        alert("当前没有可导出的有效数据包。");
        return;
      }
      const blob = new Blob([JSON.stringify(activeLocalBundle, null, 2)], { type: "application/json;charset=utf-8" });
      const downloadUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = downloadUrl;
      link.download = "local-bundle.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(downloadUrl);
      dataStatus.textContent = `已导出数据包：${activeLocalBundle.monsters.length} 只精灵，${activeLocalBundle.skills.length} 个技能，${activeLocalBundle.passives.length} 个特性。`;
    }

    function renderAdminBar() {
      if (!adminDataPanel) return;
      adminDataPanel.hidden = !isAdminMode();
    }

    async function handleAdminModeChange() {
      renderAdminBar();
      await loadDexData();
      refreshCurrentViewAfterDataChange();
    }

    function setupAdminDataPanel() {
      if (!adminDataPanel) return;
      renderAdminBar();
      adminImportDataBtn?.addEventListener("click", () => adminDataFile?.click());
      adminExportDataBtn?.addEventListener("click", exportAdminBundle);
      adminDataFile?.addEventListener("change", async () => {
        const file = adminDataFile.files?.[0];
        adminDataFile.value = "";
        if (!file) return;
        try {
          await importAdminBundleFile(file);
        } catch (error) {
          console.warn(error);
          dataStatus.textContent = "导入测试数据失败：" + error.message;
          alert("导入测试数据失败：" + error.message);
        }
      });
      adminClearDataBtn?.addEventListener("click", async () => {
        localStorage.removeItem(ADMIN_DATA_STORAGE_KEY);
        await loadDexData();
        refreshCurrentViewAfterDataChange();
        dataStatus.textContent = "已清除 admin 本地测试数据，重新读取 data/local-bundle.json。";
      });
      window.addEventListener("hashchange", handleAdminModeChange);
    }

    teamGrid.addEventListener("change", (event) => { saveTeam(); renderResults(); });
    document.addEventListener("mousedown", closeCombos);
    calculateBtn.addEventListener("click", renderResults);
    rollerBtn.addEventListener("click", rotateSkillsDown);
    undoRollerBtn.addEventListener("click", undoRoller);
    clearBtn.addEventListener("click", () => { localStorage.removeItem(STORAGE_KEY); rollerHistory.length = 0; updateRollerUndoButton(); renderTeam(defaultTeam()); renderResults(); });
    async function startApp() {
      setupAdminDataPanel();
      await loadDexData();
      renderTeam(sanitizeTeamForDex(loadTeam()));
      renderMatrix();
      renderResults();
    }
    startApp();
  </script>
